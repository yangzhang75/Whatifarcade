<!doctype html>
<!-- Firefly Jar · build v0.10 · 2026-06-20 · Noodle Studios / What If Arcade · three scenes (meadow/forest/mesa) for MVP -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Firefly Jar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root{
    --night:#0E0B16; --dusk:#1C1530; --duskdeep:#281B3C;
    --amber:#F0CF86; --cream:#F6E7C4; --rust:#D2743F; --dust:#C98F4A;
    --teal:#9FD8D8; --ink:#F6E7C4; --ghost:#9a8fb0; --line:rgba(246,231,196,.14);
    --mono:"Press Start 2P", ui-monospace, Menlo, Consolas, monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--night); color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:100dvh; padding:16px; gap:11px; overflow:hidden;}
  .eyebrow{font-family:var(--mono); font-size:9px; letter-spacing:.18em; color:var(--rust); text-transform:uppercase; opacity:.85;}
  #stage{position:relative;}
  canvas#game{
    image-rendering:pixelated; image-rendering:crisp-edges;
    height:min(70dvh,560px); width:auto; max-width:94vw;
    aspect-ratio:144/256; border-radius:12px; border:1px solid var(--line);
    display:block; touch-action:none;
    box-shadow:0 20px 56px -24px rgba(208,116,63,.55);}
  .overlay{position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:15px; line-height:1.55;
    padding:24px; border-radius:12px; cursor:pointer;
    background:radial-gradient(120% 90% at 50% 40%, rgba(14,11,22,.36), rgba(14,11,22,.78));}
  .overlay.hide{display:none;}
  .title{font-family:var(--mono); font-size:clamp(15px,5.4vw,18px); color:var(--cream); letter-spacing:.04em; line-height:1.5;}
  .wish{font-style:italic; font-size:13px; color:var(--amber); max-width:24ch; line-height:1.5;}
  .hint{font-family:var(--mono); font-size:9px; color:var(--ghost); letter-spacing:.08em;}
  .close-line{font-style:italic; font-size:15px; color:var(--teal); max-width:26ch; line-height:1.6;
    text-shadow:0 0 14px rgba(159,216,216,.35);}
  .count{font-family:var(--mono); font-size:11px; color:var(--cream); letter-spacing:.06em;}
  .best{font-family:var(--mono); font-size:8px; color:var(--ghost); letter-spacing:.06em;}
  .btn{font-family:var(--mono); font-size:10px; color:var(--night); background:var(--amber);
    border:none; border-radius:9px; padding:11px 16px; cursor:pointer; letter-spacing:.04em;}
  .btn:hover{background:var(--cream);}
  .picker{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:250px; margin:2px 0 2px;}
  .chip{font-family:var(--mono); font-size:8px; letter-spacing:.04em; color:var(--ghost);
    background:transparent; border:1px solid var(--line); border-radius:7px; padding:7px 9px; cursor:pointer;}
  .chip:hover{border-color:var(--rust); color:var(--cream);}
  .chip.on{border-color:var(--amber); color:var(--amber);}
  .bar2{width:min(340px,94vw); display:flex; gap:8px;}
  button.mini{font-family:var(--mono); font-size:8px; color:var(--ink); background:transparent;
    border:1px solid var(--line); border-radius:8px; padding:8px 6px; cursor:pointer; flex:1; letter-spacing:.03em;}
  button.mini:hover{border-color:var(--rust); color:var(--cream);}
  button.mini.on{border-color:var(--amber); color:var(--amber);}
  .seedtag{font-family:var(--mono); font-size:8px; color:var(--dust); letter-spacing:.04em;}
  :focus-visible{outline:2px solid var(--amber); outline-offset:3px;}
</style>
</head>
<body>
<div class="eyebrow">Noodle Studios · What If Arcade</div>
<div id="stage">
  <canvas id="game" width="144" height="256" tabindex="0"></canvas>
  <div class="overlay" id="intro">
    <div class="title">Firefly Jar</div>
    <div class="wish">Every summer had a last hour before someone called you in.</div>
    <div class="picker" id="scenePicker"></div>
    <button class="btn" id="begin">begin</button>
    <div class="hint">drag to move the jar</div>
  </div>
  <div class="overlay hide" id="end">
    <div class="close-line" id="closeLine"></div>
    <div class="count" id="endCount"></div>
    <div class="best" id="endBest"></div>
    <button class="btn" id="again">stay out again</button>
    <button class="chip" id="changePlace">← another place</button>
  </div>
</div>
<div class="seedtag" id="seedtag">#00000 · clear</div>
<div class="bar2">
  <button class="mini on" id="sound">sound: on</button>
  <button class="mini" id="music">music: off</button>
</div>

<!-- shared relight kernel (single source of truth: Lab + reader + games) -->
<script>
/* ============================================================================
   relight.js — Noodle Studios / What If Arcade — canonical relight kernel.
   Pure typed-array code: runs in the browser (window.Relight) AND in Node
   (require). One source of truth for the Lab, the headless reader, and games.

   API:
     prepare(img)            -> G-buffer {W,H,N,base,alpha,height,nx,ny,nz,edge,ao}
     cycle(t,W,H,opt)        -> light rig (directional sun/moon, traverse, horizon)
     render(out,g,rig,o)     -> physical foreground relight
     emitters / godRays / shaftsManual / bloom / grade / focus / ditherPalette / paintSky
     compose(g,rig,cfg)      -> full locked pipeline -> RGBA buffer
     MOODS                   -> mood/grade presets
   ============================================================================ */
(function(root, factory){
  if (typeof module==='object' && module.exports) module.exports = factory();
  else root.Relight = factory();
})(typeof self!=='undefined'?self:this, function(){
  'use strict';
  const clamp=v=>v<0?0:v>1?1:v;
  const lerp=(a,b,t)=>a+(b-a)*t;
  const smooth=t=>{t=clamp(t);return t*t*(3-2*t);};
  const mix3=(a,b,t)=>{t=clamp(t);return [a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t];};
  function set(buf,W,H,x,y,r,g,b){ x|=0;y|=0; if(x<0||x>=W||y<0||y>=H)return; const i=(y*W+x)*4; buf[i]=r;buf[i+1]=g;buf[i+2]=b;buf[i+3]=255; }
  function blend(buf,W,H,x,y,r,g,b,a){ x|=0;y|=0; if(x<0||x>=W||y<0||y>=H||a<=0)return; if(a>1)a=1; const i=(y*W+x)*4; buf[i]+=(r-buf[i])*a; buf[i+1]+=(g-buf[i+1])*a; buf[i+2]+=(b-buf[i+2])*a; buf[i+3]=255; }

  /* ---- 1. prepare: image -> G-buffer (base/alpha/height/normals/edge/ao) ---- */
  function prepare(img){
    const W=img.width, H=img.height, d=img.data, N=W*H;
    const base=new Uint8ClampedArray(N*3), alpha=new Float32Array(N), lum=new Float32Array(N);
    for(let i=0;i<N;i++){ const r=d[i*4],g=d[i*4+1],b=d[i*4+2];
      base[i*3]=r; base[i*3+1]=g; base[i*3+2]=b; alpha[i]=d[i*4+3]/255; lum[i]=(0.299*r+0.587*g+0.114*b)/255; }
    const A=(x,y)=>alpha[(y<0?0:y>=H?H-1:y)*W+(x<0?0:x>=W?W-1:x)];
    const L=(x,y)=>{const X=x<0?0:x>=W?W-1:x,Y=y<0?0:y>=H?H-1:y,i=Y*W+X;return lum[i]*alpha[i];};
    const h=new Float32Array(N);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++) h[y*W+x]=(L(x,y)*2+L(x-1,y)+L(x+1,y)+L(x,y-1)+L(x,y+1))/6;
    const Hh=(x,y)=>h[(y<0?0:y>=H?H-1:y)*W+(x<0?0:x>=W?W-1:x)];
    const nx=new Float32Array(N),ny=new Float32Array(N),nz=new Float32Array(N),edge=new Float32Array(N),ao=new Float32Array(N);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const i=y*W+x;
      const gx=(Hh(x+1,y-1)+2*Hh(x+1,y)+Hh(x+1,y+1))-(Hh(x-1,y-1)+2*Hh(x-1,y)+Hh(x-1,y+1));
      const gy=(Hh(x-1,y+1)+2*Hh(x,y+1)+Hh(x+1,y+1))-(Hh(x-1,y-1)+2*Hh(x,y-1)+Hh(x+1,y-1));
      const agx=A(x+1,y)-A(x-1,y), agy=A(x,y+1)-A(x,y-1), es=Math.min(1,Math.hypot(agx,agy)*1.2); edge[i]=es;
      let X=(-gx)*(1-es)+(-agx)*es, Y=(-gy)*(1-es)+(-agy)*es, Z=1*(1-es)+0.35*es, m=Math.hypot(X,Y,Z)||1;
      nx[i]=X/m; ny[i]=Y/m; nz[i]=Z/m; }
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const c=Hh(x,y); let occ=0,cnt=0;
      for(let oy=-2;oy<=2;oy++)for(let ox=-2;ox<=2;ox++){ if(!ox&&!oy)continue; occ+=Math.max(0,Hh(x+ox,y+oy)-c); cnt++; }
      ao[y*W+x]=1-Math.min(1,(occ/cnt)*7); }
    return {W,H,N,base,alpha,height:h,nx,ny,nz,edge,ao};
  }

  /* ---- 2. cycle: t(0..1) + per-scene path config -> directional light rig ---- */
  function cycle(t,W,H,opt){
    opt=opt||{};
    const warmth=clamp(1 - t/0.52), nightV=clamp((t-0.40)/0.60);
    const mode=opt.traverse||'vertical', az=opt.az||0, elev=opt.elev!=null?opt.elev:0.6;
    const horY=(opt.horizon!=null?opt.horizon:0.72)*H;
    let sunX,sunY,moonX,moonY, sunI=warmth, moonI=nightV;
    if(mode==='horizontal'){
      const arcH=(0.30+elev*0.55)*H, sp=clamp(t/0.92);
      sunX=lerp((0.06+az)*W,(0.94+az)*W, t);
      sunY=horY - arcH*Math.sin(Math.PI*sp);
      sunI=Math.max(0, Math.sin(Math.PI*sp));
      const mp=clamp((t-0.42)/0.6);
      moonX=lerp((0.94+az)*W,(0.06+az)*W, clamp((t-0.45)/0.55));
      moonY=horY - arcH*0.85*Math.sin(Math.PI*mp);
      moonI=clamp((t-0.5)/0.4)*Math.max(0,Math.sin(Math.PI*mp));
    } else {
      sunX=(0.50+az)*W; sunY=lerp(H*0.06, H*1.18, smooth(clamp(t/0.46)));
      moonX=(0.44+az)*W; moonY=lerp(H*0.92, H*0.10, smooth(clamp((t-0.36)/0.62)));
    }
    const cx=W*0.5, cyH=horY, zE=0.45+elev*1.7;
    const dirOf=(px,py)=>{ let Lx=(px-cx)/W*2.2, Ly=(py-cyH)/H*2.2, Lz=zE, m=Math.hypot(Lx,Ly,Lz)||1; return [Lx/m,Ly/m,Lz/m]; };
    const horizon=mix3([244,150,86],[20,16,40],smooth(clamp(t/0.62)));
    const top    =mix3([66,42,92],[8,6,16],smooth(clamp(t/0.5)));
    const ambient=mix3([46,40,70],[16,15,30],smooth(t));
    return { t, warmth, night:nightV, horizonY:horY,
      sun :{x:sunX, y:sunY, z:70, color:[255,206,150], intensity:sunI, dir:dirOf(sunX,sunY), directional:true},
      moon:{x:moonX,y:moonY,z:60, color:[150,172,210], intensity:moonI, dir:dirOf(moonX,moonY), directional:true},
      ambient:{color:ambient}, sky:{horizon, top} };
  }

  const MOODS={
    neutral :{on:false, sat:1.00, contrast:1.00, lift:0.00, vig:0.00, shTint:[.45,.50,.60], hiTint:[.55,.50,.45], tint:0.00},
    comfort :{on:true,  sat:1.12, contrast:0.96, lift:0.04, vig:0.18, shTint:[.52,.46,.52], hiTint:[.64,.54,.40], tint:0.24},
    solitude:{on:true,  sat:0.76, contrast:1.03, lift:0.05, vig:0.34, shTint:[.42,.48,.64], hiTint:[.50,.53,.60], tint:0.28},
    tension :{on:true,  sat:0.88, contrast:1.22, lift:0.00, vig:0.42, shTint:[.40,.44,.60], hiTint:[.62,.50,.42], tint:0.22},
    wonder  :{on:true,  sat:1.16, contrast:0.93, lift:0.08, vig:0.22, shTint:[.40,.50,.60], hiTint:[.54,.62,.66], tint:0.32}
  };

  /* ---- 3. render: physical foreground relight ---- */
  function render(out,g,rig,o){
    o=o||{};
    const {W,H,N,base,alpha,nx,ny,nz,edge,ao}=g;
    const ambFloor=o.ambient!=null?o.ambient:0.20, nStr=o.normalStrength!=null?o.normalStrength:0.42, rimK=o.rimK!=null?o.rimK:3.4;
    const useNorm=o.normal!==false, useRim=o.rim!==false, useGrade=o.grade!==false, useEmis=!!o.emissive,
          useAO=o.ao!==false, aoStr=o.aoStrength!=null?o.aoStrength:0.6;
    const amb=rig.ambient.color, sun=rig.sun, moon=rig.moon;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const i=y*W+x;
      if(alpha[i]<0.03){ out[i*4+3]=0; continue; }
      let R=base[i*3],G=base[i*3+1],B=base[i*3+2];
      let Nx=nx[i]*nStr,Ny=ny[i]*nStr,Nz=nz[i]; const nm=Math.hypot(Nx,Ny,Nz)||1; Nx/=nm;Ny/=nm;Nz/=nm;
      let lr=0,lg=0,lb=0;
      if(useGrade){ lr+=amb[0]/255*ambFloor+ambFloor; lg+=amb[1]/255*ambFloor+ambFloor; lb+=amb[2]/255*ambFloor+ambFloor; } else { lr=lg=lb=1; }
      out._rimR=out._rimG=out._rimB=0;
      function lamp(li){ if(li.intensity<=0.001)return;
        let Lx,Ly,Lz;
        if(li.dir){ Lx=li.dir[0];Ly=li.dir[1];Lz=li.dir[2]; }
        else { Lx=li.x-x;Ly=li.y-y;Lz=li.z; const ll=Math.hypot(Lx,Ly,Lz)||1; Lx/=ll;Ly/=ll;Lz/=ll; }
        if(useNorm){ const dd=Math.max(0,Nx*Lx+Ny*Ly+Nz*Lz), k=li.intensity*dd; lr+=li.color[0]/255*k; lg+=li.color[1]/255*k; lb+=li.color[2]/255*k; }
        if(useRim){ const fac=Math.max(0,Nx*Lx+Ny*Ly), rim=Math.pow(1-clamp(Nz),rimK)*fac*li.intensity*(0.5+0.5*edge[i]);
          out._rimR+=li.color[0]*rim; out._rimG+=li.color[1]*rim; out._rimB+=li.color[2]*rim; } }
      lamp(sun); lamp(moon);
      let oR=R*lr+out._rimR, oG=G*lg+out._rimG, oB=B*lb+out._rimB;
      if(useAO){ const aoF=1-aoStr*(1-ao[i]); oR*=aoF; oG*=aoF; oB*=aoF; }
      if(useEmis){ const warm=(R-B)/255, br=(R+G+B)/765, e=clamp((warm-0.18)*2)*clamp((br-0.4)*2)*rig.night; oR+=120*e; oG+=70*e; oB+=24*e; }
      out[i*4]=oR; out[i*4+1]=oG; out[i*4+2]=oB; out[i*4+3]=255;
    }
  }

  /* ---- emitter (point) lights: fireflies/lamps illuminate the surface ---- */
  function emitters(buf,W,H,g,lights,emitStr){
    const col=[255,210,150];
    for(const f of lights){
      const blink=0.3+0.7*Math.pow(Math.max(0,Math.sin(f.ph)),2), I=(emitStr!=null?emitStr:0.55)*blink, r=f.r;
      const x0=Math.max(0,(f.x-r)|0),x1=Math.min(W-1,(f.x+r)|0),y0=Math.max(0,(f.y-r)|0),y1=Math.min(H-1,(f.y+r)|0);
      for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){ const i=y*W+x; if(g.alpha[i]<0.03)continue;
        const Lx=f.x-x,Ly=f.y-y,dist=Math.hypot(Lx,Ly); if(dist>r)continue;
        const Lz=6,ll=Math.hypot(Lx,Ly,Lz)||1,d=Math.max(0,(g.nx[i]*Lx+g.ny[i]*Ly+g.nz[i]*Lz)/ll),fall=1-dist/r;
        blend(buf,W,H,x,y,col[0],col[1],col[2], Math.min(0.85, I*fall*fall*(0.35+0.65*d))); }
      blend(buf,W,H,f.x,f.y,255,242,205,Math.min(1,blink)); blend(buf,W,H,f.x+1,f.y,col[0],col[1],col[2],blink*0.5); blend(buf,W,H,f.x,f.y+1,col[0],col[1],col[2],blink*0.5);
    }
  }

  /* ---- Mitchell god rays: occlusion buffer + radial blur ---- */
  function godRays(buf,W,H,g,rig,ray){
    if(rig.moon.intensity<0.05)return; ray=ray||{};
    const N=g.N, occ=new Float32Array(N), mX=rig.moon.x, mY=rig.moon.y, mr=5;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ const i=y*W+x;
      if(g.alpha[i]>0.03){ occ[i]=0; continue; }
      const dd=Math.hypot(x-mX,y-mY); occ[i]= dd<mr?1:(dd<mr*4?Math.max(0,1-(dd-mr)/(mr*3))*0.5:0); }
    const SAMPLES=28, density=ray.density!=null?ray.density:0.9, weight=0.5, decay=0.93, exposure=(ray.exposure!=null?ray.exposure:0.55)*rig.moon.intensity;
    const col=mix3([150,172,210],[245,182,120],ray.warmth||0);
    for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let dx=(mX-x)/SAMPLES*density,dy=(mY-y)/SAMPLES*density,sx=x,sy=y,illum=0,decw=1;
      for(let s=0;s<SAMPLES;s++){ sx+=dx;sy+=dy; const ix=sx|0,iy=sy|0; if(ix<0||ix>=W||iy<0||iy>=H)break; illum+=occ[iy*W+ix]*decw*weight; decw*=decay; }
      illum*=exposure; if(illum>0.004){ const onTree=g.alpha[y*W+x]>0.03?1.3:1; blend(buf,W,H,x,y,col[0],col[1],col[2],Math.min(0.6,illum*onTree)); } }
  }
  function shaftsManual(buf,W,H,g,rig,time){
    if(rig.moon.intensity<0.05)return; const mp=rig.moon.intensity,mX=rig.moon.x,mY=rig.moon.y,reach=200,n=6,tn=(time||0)*0.001;
    for(let k=0;k<n;k++){ const ang=1.18+k*0.13+Math.sin(tn*0.22+k*1.7)*0.02,ca=Math.cos(ang),sa=Math.sin(ang),flick=0.8+0.2*Math.sin(tn*0.7+k*2.1);
      for(let s=8;s<reach;s++){ const fx=mX+ca*s,fy=mY+sa*s; if(fy>=H||fx<-2||fx>=W+2)break; const fall=1-s/reach,halfW=1.0+s*0.022;
        for(let w=-halfW;w<=halfW;w+=1){ const px=(fx-sa*w)|0,py=(fy+ca*w)|0; if(px<0||px>=W||py<0||py>=H)continue;
          const onTree=g.alpha[py*W+px]>0.03,e=1-Math.abs(w)/(halfW+0.6),a=smooth(clamp(mp*1.3))*fall*e*flick*(onTree?0.17:0.05);
          if(a>0.004) blend(buf,W,H,px,py,150,172,210,a); } } }
  }

  /* ---- bloom ---- */
  function bloom(buf,W,H){
    const N=W*H,thr=198,br=new Float32Array(N*3),tmp=new Float32Array(N*3),R=2,STR=0.85;
    for(let i=0;i<N;i++){ const r=buf[i*4],g=buf[i*4+1],b=buf[i*4+2],l=Math.max(r,g,b); if(l>thr){ const k=(l-thr)/(255-thr); br[i*3]=r*k;br[i*3+1]=g*k;br[i*3+2]=b*k; } }
    function blur(src,dst,horiz){ for(let y=0;y<H;y++)for(let x=0;x<W;x++){ let r=0,gg=0,b=0,n=0;
      for(let k=-R;k<=R;k++){ const xx=horiz?x+k:x,yy=horiz?y:y+k; if(xx<0||xx>=W||yy<0||yy>=H)continue; const j=(yy*W+xx)*3; r+=src[j];gg+=src[j+1];b+=src[j+2];n++; }
      const o=(y*W+x)*3; dst[o]=r/n;dst[o+1]=gg/n;dst[o+2]=b/n; } }
    blur(br,tmp,true);blur(tmp,br,false);blur(br,tmp,true);blur(tmp,br,false);
    for(let i=0;i<N;i++){ buf[i*4]=Math.min(255,buf[i*4]+br[i*3]*STR); buf[i*4+1]=Math.min(255,buf[i*4+1]+br[i*3+1]*STR); buf[i*4+2]=Math.min(255,buf[i*4+2]+br[i*3+2]*STR); }
  }

  /* ---- expressive: colour grade + focus ---- */
  const cl=v=>v<0?0:v>1?1:v, ss=(e0,e1,x)=>{ x=cl((x-e0)/(e1-e0)); return x*x*(3-2*x); };
  function grade(buf,W,H,G){ if(!G||!G.on)return; const N=W*H;
    for(let i=0;i<N;i++){ let r=buf[i*4]/255,gg=buf[i*4+1]/255,b=buf[i*4+2]/255;
      r=(r-0.5)*G.contrast+0.5; gg=(gg-0.5)*G.contrast+0.5; b=(b-0.5)*G.contrast+0.5;
      r=G.lift+r*(1-G.lift); gg=G.lift+gg*(1-G.lift); b=G.lift+b*(1-G.lift);

          if(nf>0){ r+=(12-r)*nf*0.35; g+=(12-g)*nf*0.35; b+=(26-b)*nf*0.35; }
        }

      }
      // dynamic sun descending in the cleared gap, setting behind the desert horizon

        for(let yy=-22;yy<=22;yy++)for(let xx=-22;xx<=22;xx++){ const px=sunX+xx, py=sunY+yy; if(px<0||px>=W||py<0||py>=MESA_SKYLINE[px])continue; const dd=dist(xx,yy); if(dd>22)continue; blendPx(sunX+xx,py,250,200,120, warmth*(1-dd/22)*0.18); }
        for(let yy=-10;yy<=10;yy++)for(let xx=-10;xx<=10;xx++){ const px=sunX+xx, py=sunY+yy; if(px<0||px>=W||py<0||py>=MESA_SKYLINE[px])continue; const dd=dist(xx,yy); if(dd>10)continue; const c=mix([255,232,172],[255,176,86],dd/10); blendPx(sunX+xx,py,c[0],c[1],c[2],0.96); }
      }

      if(mp>0){ const a2=smooth(clamp(mp*1.6))*0.96, hg=smooth(clamp(mp*1.4));
        for(let yy=-15;yy<=15;yy++)for(let xx=-15;xx<=15;xx++){ const px=moonX+xx, py=moonY+yy; if(px<0||px>=W||py<0||py>=MESA_SKYLINE[px])continue; const dd=dist(xx,yy); if(dd>15)continue; blendPx(moonX+xx,py,150,165,200, hg*(1-dd/15)*0.12); }
        for(let yy=-7;yy<=7;yy++)for(let xx=-7;xx<=7;xx++){ const px=moonX+xx, py=moonY+yy; if(px<0||px>=W||py<0||py>=MESA_SKYLINE[px])continue; const dd=dist(xx,yy); if(dd>7)continue; let col=C.moon; if((xx===-2&&yy===-1)||(xx===2&&yy===2))col=mix(C.moon,C.night,0.22); blendPx(moonX+xx,py,col[0],col[1],col[2], dd>6?a2*0.6:a2); }

}
function drawNear(scene, porchLit, clock){
  const g = scene==='beach'?[28,23,32] : scene==='mesa'?[18,12,16] : [9,8,16];
  for(let x=0;x<W;x++) for(let y=CFG.GROUND;y<H;y++) setPx(x,y,g[0],g[1],g[2]);
  const fl=0.8+0.2*Math.sin(clock*9), wl=mix([10,9,16],C.windowLit,porchLit);
  if(scene==='beach'){ const py=CFG.GROUND-1;
    for(let x=W-40;x<W-6;x++){ setPx(x,py,7,6,11); setPx(x,py-1,7,6,11); }
    for(let x=W-38;x<W-8;x+=9) for(let y=py;y<H;y++) setPx(x,y,6,5,9);
    if(porchLit>0){ const lx=W-9, ly=py-7; for(let r=1;r<7;r++){ const a=porchLit*fl*(1-r/7)*0.6; for(let ang=0;ang<6.28;ang+=0.5) blendPx(lx+Math.cos(ang)*r,ly+Math.sin(ang)*r,C.windowLit[0],C.windowLit[1],C.windowLit[2],a*0.5); } blendPx(lx,ly,C.windowLit[0],C.windowLit[1],C.windowLit[2],porchLit); }
    return;
  }
  if(scene==='forest'){
    if(porchLit>0){ const lx=72, ly=206; for(let r=1;r<6;r++){ const a=porchLit*fl*(1-r/6)*0.7; for(let ang=0;ang<6.28;ang+=0.6) blendPx(lx+Math.cos(ang)*r,ly+Math.sin(ang)*r,C.windowLit[0],C.windowLit[1],C.windowLit[2],a*0.5); } blendPx(lx,ly,C.windowLit[0],C.windowLit[1],C.windowLit[2],porchLit); }
    return;
  }
  if(scene==='mesa') return;
  let hx0=10, hy0=CFG.GROUND-2, ww=22, rh=7;
  for(let x=hx0;x<hx0+ww;x++) for(let y=hy0;y<H;y++) setPx(x,y,7,6,12);
  for(let i=0;i<ww/2;i++){ setPx(hx0-1+i,hy0-Math.min(i,rh),6,5,10); setPx(hx0+ww-i,hy0-Math.min(i,rh),6,5,10); }
  if(porchLit>0){ const wwn=scene==='mesa'?4:6, wh=scene==='mesa'?3:5, winx=hx0+(scene==='mesa'?3:6), winy=hy0+(scene==='mesa'?2:4);
    for(let y=winy;y<winy+wh;y++)for(let x=winx;x<winx+wwn;x++) blendPx(x,y,wl[0],wl[1],wl[2],porchLit);
    for(let r=1;r<7;r++){ const a=porchLit*fl*(1-r/7)*0.5; blendPx(winx+wwn/2,winy+wh/2,C.windowLit[0],C.windowLit[1],C.windowLit[2],a*0.04*r); } }
}

/* ============================ seeded evening ============================ */
let seed, evening, nightF=0, warmth=1, audioNight=0, audioWarm=1;
function buildEvening(R){
  const warmBias=(R()*2-1)*0.12;
  let cl=R(); cl = cl<0.5 ? 0.5*Math.pow(cl*2,1.7) : 1-0.5*Math.pow((1-cl)*2,1.7);
  const cloudiness=cl;
  const condition = cl<0.10?'clear': cl<0.32?'fair': cl<0.58?'partly cloudy': cl<0.82?'cloudy':'overcast';
  const nC=Math.round(cl*CFG.MAX_CLOUDS);
  let clouds;
  if(scene==='forest'){
    // high wispy cirrus reads right over the corridor; puffy cumulus does not
    const nW=Math.max(2,Math.round((0.4+cl)*4));
    clouds=Array.from({length:nW},()=>({ wispy:true, y:12+Math.floor(R()*74), baseX:Math.floor(R()*W), drift:16+R()*38, w:26+Math.floor(R()*48), h:2+Math.floor(R()*2), a:0.16+R()*0.20 }));
  } else {
    clouds=Array.from({length:nC},()=>{
      const scale=(0.6+R()*0.7)*(0.8+cloudiness*0.6), np=2+Math.floor(R()*3);
      const puffs=Array.from({length:np},(_,i)=>{
        const ox=Math.round((i-(np-1)/2)*(8+R()*7)*scale), oy=Math.round((R()*2-1)*3), r=Math.max(4,Math.round((6+R()*9)*scale));
        return [ox,oy,r];
      });
      return { y:22+Math.floor(R()*120), baseX:Math.floor(R()*W), drift:55+R()*120, puffs };
    });
  }
  const starN=Math.max(8,Math.round((46+R()*30)*(1-cloudiness*0.6)*(scene==='mesa'?1.5:scene==='beach'?1.3:scene==='forest'?0.7:1)));
  const stars=Array.from({length:starN},()=>({ x:Math.floor(R()*W), y:Math.floor(R()*H*0.55), b:0.35+R()*0.65, sp:1.3+R()*3, ph:R()*6.28, big:R()<0.16 }));
  let flock=null;
  if(R()<0.7){
    const dir=R()<0.5?1:-1, n=4+Math.floor(R()*7);
    const birds=Array.from({length:n},(_,i)=>({ ox:-i*(3+R()*3)*dir, oy:Math.round((R()*2-1)*2+i*0.6), ph:R()*6.28, fs:6+R()*5 }));
    flock={ dir, start:0.14+R()*0.12, span:0.13+R()*0.08, alt:38+Math.floor(R()*60), birds };
  }
  let wish=null;
  if(R() < 0.7*(1-cloudiness*0.6)*((scene==='mesa'||scene==='beach')?1.4:1)) wish={ at:0.62+R()*0.26, dur:0.02+R()*0.015, sx:0.14+R()*0.55, sy:0.07+R()*0.14, ang:(0.45+R()*0.55)*(R()<0.5?1:-1) };
  const cricketHz=3900+R()*1500;
  const glints=Array.from({length:16},()=>({ x:Math.floor(R()*W), y:24+Math.floor(R()*168), ph:R()*6.28, sp:2.4+R()*4.2, amp:0.45+R()*0.55 }));
  return { warmBias, cloudiness, condition, clouds, stars, flock, wish, cricketHz, glints };
}
function newEvening(s){
  seed=(s===undefined)?(Math.random()*1e9|0):(s>>>0);
  evening=buildEvening(mulberry32(seed));
  musRng=null; musIdx=8;
  document.getElementById('seedtag').textContent='#'+String(seed%100000).padStart(5,'0')+' · '+evening.condition;
}
function stopCols(t){
  const wb=evening.warmBias, warmT=[240,180,110], coolT=[58,44,82];
  return STOPC.map(s=>{
    const tt=clamp((t-s.delay)/(1-s.delay));
    let c=mix(s.sun,s.night,smooth(tt));
    const sw=(1-smooth(tt))*0.6;
    c = wb>0 ? mix(c,warmT,wb*sw) : mix(c,coolT,(-wb)*sw);
    return c;
  });
}

/* ============================ game state ============================ */
let phase='intro';          // intro | play | end
let t=0;                    // the evening clock (also the round timer)
let jarX, jarTargetX, fillGlow=0, count=0, best=0;
let scene='meadow';
let sunCaptured=false, halo=0;
let moonCaptured=false, moonHold=0, moonGlow=0;
let flies=[], caught=[];
const input={left:false,right:false};

function spawnFly(fromEdge){
  const R=Math.random;

  const r=R();
  const type = r<0.03 ? 'dragonfly' : r<0.06 ? 'moth' : r<0.11 ? 'ember' : 'firefly';
  const speed = type==='dragonfly' ? (18+R()*10) : type==='moth' ? (5+R()*5) : (8+R()*12);
  return {
    type, rare: type!=='firefly',
    x: fromEdge ? (dir>0?-4:W+4) : R()*W,
    y: 50+R()*140,
    vx: speed*(fromEdge?dir:(R()<0.5?1:-1)),
    vy: (R()*2-1)*(type==='moth'?3:7),
    bob: R()*6.28, blink: R()*6.28, bsp: type==='moth'?1.3:(2.4+R()*1.8),
    st:'hover', stt:0.4+R()*0.8, tx:0, ty:0,
  };
}
function resetRound(){

  jarX = W/2 - CFG.JAR_W/2; jarTargetX = jarX;

}

/* ============================ render ============================ */
function render(clock){
  const cols=stopCols(t);
  warmth=1-smooth(clamp(t/0.55));
  const sp=clamp(t/0.45), sunX=sunXFor(scene), sunY=lerp(H*0.06,H*1.02,smooth(sp));
  const sunUp=1-smooth(clamp((t-0.30)/0.32));
  const mp=clamp((t-0.42)/0.58), moonX=moonXFor(scene), moonY=lerp(groundYFor(scene),H*0.16,smooth(mp));
  nightF=smooth(clamp((t-0.34)/0.5));
  audioNight=nightF; audioWarm=warmth;
  const porchLit=smooth(clamp((t-0.80)/0.14));

  /* --- sky gradient + sun glow + dither --- */
  let seg=0;
  for(let y=0;y<H;y++){
    const h=y/(H-1);
    while(seg<STOPC.length-2 && h>STOPC[seg+1].h) seg++;
    const a=cols[seg], b=cols[seg+1], lt=(h-STOPC[seg].h)/(STOPC[seg+1].h-STOPC[seg].h);
    const br=lerp(a[0],b[0],lt), bg=lerp(a[1],b[1],lt), bb=lerp(a[2],b[2],lt);
    for(let x=0;x<W;x++){
      let r=br,g=bg,bl=bb;
      const gl=Math.max(0,1-dist(x-sunX,y-sunY)/CFG.SUN_GLOW_R), gf=gl*gl*warmth*0.85+gl*gl*sunUp*0.35;
      if(gf>0){ const k=Math.min(1,gf); r+=(C.cream[0]-r)*k; g+=(C.cream[1]-g)*k; bl+=(C.cream[2]-bl)*k; }
      const dth=(BAYER[y&3][x&3]/16-0.5)*CFG.DITHER_Q, i=(y*W+x)*4;
      buf[i]=clamp(Math.round((r+dth)/CFG.DITHER_Q)*CFG.DITHER_Q,0,255);
      buf[i+1]=clamp(Math.round((g+dth)/CFG.DITHER_Q)*CFG.DITHER_Q,0,255);
      buf[i+2]=clamp(Math.round((bl+dth)/CFG.DITHER_Q)*CFG.DITHER_Q,0,255);
      buf[i+3]=255;
    }
  }

  /* --- sun --- */
  if(sunY<H*1.02){ const rS=12; for(let yy=-rS;yy<=rS;yy++)for(let xx=-rS;xx<=rS;xx++){ const dd=dist(xx,yy); if(dd>rS)continue; const col=dd>rS-1.4?C.amber:mix(C.cream,C.amber,dd/rS*0.5); setPx(sunX+xx,sunY+yy,col[0],col[1],col[2]); } }

  /* --- clouds --- */
  const cTop=mix(C.duskdeep,C.dust,warmth), cBelly=mix([74,38,34],C.amber,warmth);
  const wispCol=mix(mix(C.duskdeep,C.dust,0.6),C.amber,warmth*0.45);
  for(const cl of evening.clouds){
    const x0=((cl.baseX+t*cl.drift)%(W+80))-40;
    if(cl.wispy){
      for(let yy=0;yy<cl.h;yy++)for(let xx=0;xx<cl.w;xx++){
        const ex=Math.sin(xx/cl.w*Math.PI), vy=1-Math.abs((yy-(cl.h-1)/2)/(cl.h/2+0.001));
        blendPx(x0+xx, cl.y+yy, wispCol[0],wispCol[1],wispCol[2], cl.a*ex*(0.55+0.45*vy)*(0.7+0.3*Math.sin(clock*0.25+xx*0.35)));
      }
    } else {
      for(const p of cl.puffs){ const cx=x0+p[0], cy=cl.y+p[1], r=p[2];
        for(let yy=-r;yy<=r;yy++)for(let xx=-r;xx<=r;xx++){ if(xx*xx+yy*yy>r*r)continue; const vt=smooth((yy+r)/(2*r)), col=mix(cTop,cBelly,vt); blendPx(cx+xx,cy+yy,col[0],col[1],col[2], vt>0.82?1:0.97); } }
    }
  }

  /* --- dusk flock --- */
  if(evening.flock){ const f=evening.flock, fp=(t-f.start)/f.span;
    if(fp>0&&fp<1){ const baseX=f.dir>0?lerp(-22,W+22,fp):lerp(W+22,-22,fp); const col=mix(C.rustDeep,C.night,smooth(clamp((t-0.1)/0.32))); const a=smooth(clamp(Math.min(fp,1-fp)*4));
      for(const bd of f.birds){ const bx=baseX+bd.ox+Math.sin(clock*0.5+bd.ph)*1.2, by=f.alt+bd.oy+Math.sin(clock*0.7+bd.ph)*1.4, up=Math.sin(clock*bd.fs+bd.ph)>0;
        blendPx(bx,by,col[0],col[1],col[2],a); blendPx(bx-1,by+(up?-1:0),col[0],col[1],col[2],a); blendPx(bx+1,by+(up?-1:0),col[0],col[1],col[2],a); blendPx(bx-2,by+(up?-1:1),col[0],col[1],col[2],a*0.8); blendPx(bx+2,by+(up?-1:1),col[0],col[1],col[2],a*0.8); } } }

  /* --- moon --- */
  if(mp>0){ const rH=15, aH=smooth(clamp(mp*1.4)); for(let yy=-rH;yy<=rH;yy++)for(let xx=-rH;xx<=rH;xx++){ const dd=dist(xx,yy); if(dd>rH)continue; blendPx(moonX+xx,moonY+yy,150,165,200, aH*(1-dd/rH)*0.10); } }
  if(mp>0){ const rM=7, a=smooth(clamp(mp*1.6))*0.96; for(let yy=-rM;yy<=rM;yy++)for(let xx=-rM;xx<=rM;xx++){ const dd=dist(xx,yy); if(dd>rM)continue; let col=C.moon; if((xx===-2&&yy===-1)||(xx===2&&yy===2)||(xx===0&&yy===-3))col=mix(C.moon,C.night,0.22); blendPx(moonX+xx,moonY+yy,col[0],col[1],col[2], dd>rM-1?a*0.6:a); } }

  /* --- wish-star --- */
  if(evening.wish){ const w=evening.wish, wp=(t-w.at)/w.dur; if(wp>0&&wp<1){ const hx=lerp(w.sx*W,w.sx*W+Math.cos(w.ang)*W*0.7,wp), hy=lerp(w.sy*H,w.sy*H+Math.sin(w.ang)*H*0.42,wp);
    for(let i=0;i<9;i++){ const tt=i/9; blendPx(hx-Math.cos(w.ang)*i*1.2,hy-Math.sin(w.ang)*i*1.2,C.cream[0],C.cream[1],C.cream[2],(1-tt)*0.85*smooth(Math.min(wp,1-wp)*5)); } setPx(hx,hy,255,255,250); } }

  /* --- stars --- */
  if(nightF>0.01){ for(const s of evening.stars){ const tw=0.55+0.45*Math.sin(clock*s.sp+s.ph), a=clamp(nightF*s.b*tw); blendPx(s.x,s.y,C.cream[0],C.cream[1],C.cream[2],a); if(s.big&&a>0.4){ blendPx(s.x+1,s.y,C.cream[0],C.cream[1],C.cream[2],a*0.7); blendPx(s.x,s.y+1,C.cream[0],C.cream[1],C.cream[2],a*0.7); } } }

  /* --- far scene silhouette (sun sets behind / into) --- */
  drawFar(scene, warmth, sunX, sunY, clock, moonX, moonY, mp);

  /* --- loose insects (behind the glass) --- */
  for(const f of flies){
    const a=0.35+0.65*Math.abs(Math.sin(f.blink));
    if(f.type==='moth'){
      const g=[150,225,160], wing=[120,190,135];
      for(let yy=-3;yy<=3;yy++)for(let xx=-3;xx<=3;xx++){ const dd=dist(xx,yy); if(dd>3.3)continue; blendPx(f.x+xx,f.y+yy,g[0],g[1],g[2],a*(1-dd/3.6)*0.85); }
      blendPx(f.x-2,f.y,wing[0],wing[1],wing[2],a*0.8); blendPx(f.x+2,f.y,wing[0],wing[1],wing[2],a*0.8);
      blendPx(f.x-3,f.y+1,wing[0],wing[1],wing[2],a*0.5); blendPx(f.x+3,f.y+1,wing[0],wing[1],wing[2],a*0.5);
      blendPx(f.x,f.y,235,255,235,a);
    } else if(f.type==='dragonfly'){
      const c=[255,210,140];
      if(f.st==='dart'){ const ddx=f.tx-f.x, ddy=f.ty-f.y, dd=dist(ddx,ddy)||1; for(let k=1;k<=3;k++) blendPx(f.x-ddx/dd*k, f.y-ddy/dd*k, c[0],c[1],c[2], a*0.3*(1-k/4)); }
      blendPx(f.x,f.y,c[0],c[1],c[2],a); blendPx(f.x+1,f.y,c[0],c[1],c[2],a*0.9); blendPx(f.x-1,f.y,c[0],c[1],c[2],a*0.7); blendPx(f.x+2,f.y,c[0],c[1],c[2],a*0.5);
      const wf=Math.sin(clock*22)>0?-1:0;
      blendPx(f.x,f.y-1+wf,c[0],c[1],c[2],a*0.5); blendPx(f.x+1,f.y-1+wf,c[0],c[1],c[2],a*0.4); blendPx(f.x,f.y+1,c[0],c[1],c[2],a*0.45); blendPx(f.x+1,f.y+1,c[0],c[1],c[2],a*0.35);
    } else if(f.rare){
      const cr=[255,200,120];
      for(let yy=-2;yy<=2;yy++)for(let xx=-2;xx<=2;xx++){ const dd=dist(xx,yy); if(dd>2.3)continue; blendPx(f.x+xx,f.y+yy,cr[0],cr[1],cr[2],a*(1-dd/2.6)*0.9); }
      blendPx(f.x,f.y,255,236,180,a);
    } else {
      blendPx(f.x,f.y,255,243,176,a*0.95); blendPx(f.x+1,f.y,255,243,176,a*0.4); blendPx(f.x-1,f.y,255,243,176,a*0.4); blendPx(f.x,f.y+1,255,243,176,a*0.4); blendPx(f.x,f.y-1,255,243,176,a*0.4);
    }
  }

  /* --- near ground + the scene's structure & its called-in light --- */
  drawNear(scene, porchLit, clock);

  /* --- the glass jar (refraction over the snapshot) --- */
  bgsnap.set(buf);
  const jw=CFG.JAR_W, jh=CFG.JAR_H, jx=Math.round(jarX), jtop=H-CFG.JAR_BASE-jh, jcx=jx+jw/2;
  const fill=clamp(count/9);
  fillGlow += (fill-fillGlow)*0.08;
  const breathe=0.92+0.08*Math.sin(clock*1.6);
  const rad=6;
  function inJar(lx,ly){ // rounded-rect body

    const cxx = lx<rad?rad-lx : lx>jw-1-rad?lx-(jw-1-rad):0;

    col=[col[0]*0.94+10, col[1]*0.94+9, col[2]*0.94+14];      // cool glass tint
    // warm interior light pooling up from the bottom as it fills
    const up=1-(ly/jh);
    const warmAmt=fillGlow*clamp(up*1.4)*0.85*breathe + halo*0.42*clamp(up*1.2);
    if(warmAmt>0){ col=[col[0]+(C.amber[0]-col[0])*warmAmt, col[1]+(C.amber[1]-col[1])*warmAmt, col[2]+(C.amber[2]-col[2])*warmAmt]; }
    if(moonGlow>0){ const cool=moonGlow*0.5; col=[col[0]+(C.teal[0]-col[0])*cool, col[1]+(C.teal[1]-col[1])*cool, col[2]+(C.teal[2]-col[2])*cool]; }
    setPx(px,py,col[0],col[1],col[2]);
  }
  // caught fireflies swirl inside in a slow vortex
  { const cx=jcx, yBot=jtop+jh-6, yTop=jtop+7, rMax=jw/2-5, n=caught.length, rScale=clamp(n/3,0.4,1);
    caught.forEach((c,i)=>{
      const vp=(clock*0.16 + i*0.137)%1;
      const radius=lerp(rMax, rMax*0.45, vp)*rScale;
      const th=clock*1.5 + i*2.39, depth=Math.sin(th);
      const x=cx+Math.cos(th)*radius;
      const y=lerp(yBot,yTop,vp)+depth*radius*0.28 - Math.sin(clock*1.3+i)*0.4;
      const lx=Math.round(x-jx), ly=Math.round(y-jtop);
      if(lx<0||lx>=jw||ly<0||ly>=jh||!inJar(lx,ly)) return;
      const front=(depth+1)/2, br=0.45+0.55*front;
      let col = c.type==='moth' ? [150,225,160] : c.type==='dragonfly' ? [255,210,140] : c.rare ? [255,205,135] : [255,238,150];
      if(moonGlow>0) col=mix(col,[200,228,228],moonGlow*0.85);
      blendPx(x,y,col[0],col[1],col[2],0.9*br);
      if(front>0.55){ blendPx(x+1,y,col[0],col[1],col[2],0.4*br); blendPx(x-1,y,col[0],col[1],col[2],0.4*br); blendPx(x,y+1,col[0],col[1],col[2],0.4*br); blendPx(x,y-1,col[0],col[1],col[2],0.4*br); }
      if(c.rare && c.type!=='moth' && moonGlow<0.3) blendPx(x,y,255,225,170,0.5*br);
    });
  }
  // specular rim + outline
  for(let ly=0;ly<jh;ly++)for(let lx=0;lx<jw;lx++){
    if(!inJar(lx,ly))continue;
    const px=jx+lx, py=jtop+ly;
    const leftEdge=!inJar(lx-1,ly), topEdge=!inJar(lx,ly-1), rightEdge=!inJar(lx+1,ly), botEdge=!inJar(lx,ly+1);
    if((leftEdge||topEdge) && ly<jh*0.6) blendPx(px,py,C.cream[0],C.cream[1],C.cream[2],0.6);   // bright catch-light
    else if(rightEdge||botEdge) blendPx(px,py,90,70,90,0.5);                                      // shaded edge
  }
  // a vertical shine streak
  for(let ly=3;ly<jh-4;ly++){ if(inJar(6,ly)) blendPx(jx+6,jtop+ly,C.cream[0],C.cream[1],C.cream[2],0.12); }
  // jar lip / mouth
  for(let lx=-1;lx<jw+1;lx++){ const col=mix(C.glass,C.cream,0.4); blendPx(jx+lx,jtop-1,col[0],col[1],col[2],0.8); }
  // a glint travelling across the curved glass
  { const gx=jx+((clock*0.18)%1)*jw, lx=Math.round(gx-jx); for(let ly=4;ly<jh-5;ly++){ if(lx>=0&&lx<jw&&inJar(lx,ly)) blendPx(gx,jtop+ly,C.cream[0],C.cream[1],C.cream[2],0.10); } }
  // warm caustic pooled on the grass beneath the jar
  if(fillGlow>0.02){ const cyy=H-CFG.JAR_BASE+1, cr=9+fillGlow*11; for(let xx=-cr;xx<=cr;xx++){ const a=fillGlow*(1-Math.abs(xx)/cr)*0.22*(0.78+0.22*Math.sin(clock*3+xx*0.5)); blendPx(jcx+xx,cyy,C.amber[0],C.amber[1],C.amber[2],a); blendPx(jcx+xx,cyy+1,C.amber[0],C.amber[1],C.amber[2],a*0.55); } }
  // sparkle motes lifting from a glowing jar
  if(fillGlow>0.25){ for(let s=0;s<4;s++){ const ph=(clock*0.5+s*0.27)%1, sy=jtop-2-ph*14, sx=jcx+Math.sin(s*2.1+clock*0.6)*6; blendPx(sx,sy,C.cream[0],C.cream[1],C.cream[2],fillGlow*(1-ph)*0.55); } }
  // easter egg: the captured-sun halo, blooming and slowly fading
  if(halo>0){
    const cxh=jcx, cyh=jtop+jh*0.5, maxR=24, ringR=(1-halo)*16+9;
    for(let yy=-maxR;yy<=maxR;yy++)for(let xx=-maxR;xx<=maxR;xx++){ const d=dist(xx,yy); if(d>maxR)continue; const col=mix(C.amber,C.cream,1-d/maxR); blendPx(cxh+xx,cyh+yy,col[0],col[1],col[2], halo*Math.max(0,1-d/maxR)*0.32); }
    for(let ang=0;ang<6.28;ang+=0.1) blendPx(cxh+Math.cos(ang)*ringR, cyh+Math.sin(ang)*ringR, C.cream[0],C.cream[1],C.cream[2], halo*0.45);
  }
  // easter egg: the moonbeam — charges while held, blooms teal, slowly fades
  { const beamI = moonCaptured ? moonGlow : (moonHold/2.4)*0.5;
    if(beamI>0.01 && mp>0){
      const topY=moonY+4, botY=jtop+4;
      for(let y=topY;y<botY;y++){ const fr=(y-topY)/((botY-topY)||1), halfW=lerp(2,jw*0.42,fr), bx=lerp(moonX,jcx,fr);
        for(let x=-halfW;x<=halfW;x++){ const a=beamI*(1-Math.abs(x)/halfW)*0.16*(0.7+0.3*Math.sin(clock*2+y*0.3)); blendPx(bx+x,y,C.teal[0],C.teal[1],C.teal[2],a); } }
      if(moonGlow>0){ const cyh2=jtop+jh*0.5; for(let yy=-14;yy<=14;yy++)for(let xx=-14;xx<=14;xx++){ const d=dist(xx,yy); if(d>14)continue; blendPx(jcx+xx,cyh2+yy,C.teal[0],C.teal[1],C.teal[2], moonGlow*Math.max(0,1-d/14)*0.22); } }
    }
  }

  /* --- nightfall vignette --- */
  if(nightF>0.35){ const v=(nightF-0.35)*0.34; for(let x=0;x<W;x++){ blendPx(x,0,5,5,14,v*0.6); blendPx(x,H-1,5,5,14,v); } }
  if(phase==='end'){ for(let i=0;i<buf.length;i+=4){ buf[i]*=0.78; buf[i+1]*=0.78; buf[i+2]*=0.82; } }

  ctx.putImageData(img,0,0);
}

/* ============================ update ============================ */
function update(dt){
  if(phase!=='play') return;
  t += dt/CFG.DURATION;
  // jar follows target with weight
  if(input.left) jarTargetX -= 90*dt;
  if(input.right) jarTargetX += 90*dt;
  jarTargetX = clamp(jarTargetX, 2, W-CFG.JAR_W-2);
  jarX += (jarTargetX-jarX)*CFG.JAR_EASE;
  const jcx=jarX+CFG.JAR_W/2, mouthY=H-CFG.JAR_BASE-CFG.JAR_H, fill=clamp(count/9);
  // easter egg — catch the setting sun in the jar
  if(!sunCaptured && scene!=='mesa'){
    const sx=sunXFor(scene), sy=lerp(H*0.06,H*1.02,smooth(clamp(t/0.45)));
    if(sx>jarX-2 && sx<jarX+CFG.JAR_W+2 && sy>mouthY-8 && sy<mouthY+CFG.JAR_H){ sunCaptured=true; halo=1; pingSun(); }
  }
  if(halo>0) halo=Math.max(0, halo-dt/2.6);
  // easter egg — hold the still jar under the risen moon (a vigil, not a grab)
  { const mpu=clamp((t-0.42)/0.58), moonXu=moonXFor(scene);
    const aligned=Math.abs(jcx-moonXu)<CFG.JAR_W*0.5+2, still=Math.abs(jarTargetX-jarX)<0.6 && !input.left && !input.right;
    if(!moonCaptured && mpu>0.55 && aligned && still){ moonHold+=dt; if(moonHold>=2.4){ moonCaptured=true; moonGlow=1; pingMoon(); } }
    else if(!moonCaptured){ moonHold=Math.max(0,moonHold-dt*1.5); }
  }
  if(moonGlow>0) moonGlow=Math.max(0, moonGlow-dt/3.4);
  // insects
  for(let i=flies.length-1;i>=0;i--){
    const f=flies[i];
    f.blink+=dt*f.bsp; f.bob+=dt*1.6;
    if(f.type==='dragonfly'){
      f.stt-=dt;
      if(f.st==='hover'){
        f.x+=f.vx*0.04*dt; f.y+=Math.sin(f.bob)*0.25;
        if(f.stt<=0){ f.st='dart'; f.stt=0.22+Math.random()*0.3; f.tx=clamp(f.x+(Math.random()*2-1)*64,6,W-6); f.ty=clamp(f.y+(Math.random()*2-1)*44,36,198); }
      } else {
        const ddx=f.tx-f.x, ddy=f.ty-f.y, dd=dist(ddx,ddy)||1;
        f.x+=ddx/dd*72*dt; f.y+=ddy/dd*72*dt;
        if(dd<3||f.stt<=0){ f.st='hover'; f.stt=0.5+Math.random()*1.0; }
      }
    } else {
      f.x += f.vx*dt;
      f.y += f.vy*dt + Math.sin(f.bob)*(f.type==='moth'?0.35:0.2);
      if(f.y<36){f.y=36;f.vy=Math.abs(f.vy);} if(f.y>198){f.y=198;f.vy=-Math.abs(f.vy);}
      const dx=jcx-f.x, dy=mouthY-f.y, d=dist(dx,dy)||1;
      const pull=(0.15+fill*0.7)*(f.type==='moth'?1.6:1);   // moths to a flame
      if(d<60){ f.x+=dx/d*pull*16*dt; f.y+=dy/d*pull*14*dt; }
    }
    const catchable = f.type!=='dragonfly' || f.st==='hover';
    if(catchable && f.x>jarX-3 && f.x<jarX+CFG.JAR_W+3 && f.y>mouthY-7 && f.y<mouthY+10){
      flies.splice(i,1); caught.push({type:f.type,rare:f.rare}); count++; pingCatch(f.rare);
      flies.push(spawnFly(true));
      continue;
    }
    if(f.x<-10||f.x>W+10){ flies.splice(i,1); flies.push(spawnFly(true)); }
  }
  if(t>=1){ t=1; endRound(); }
}

/* ============================ audio ============================ */
let actx=null, master=null, ambG=null, musG=null, musDelay=null;
let ambOn=true, musOn=false, crickTimer=null, musTimer=null, musRng=null, musIdx=8;
const SCALE=[0,2,4,7,9];
function noiseBuf(sec){const b=actx.createBuffer(1,Math.floor(actx.sampleRate*sec),actx.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b;}
function ensureAudio(){
  if(actx)return true;
  try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return false; }
  master=actx.createGain(); master.gain.value=0.7; master.connect(actx.destination);
  ambG=actx.createGain(); ambG.gain.value=0.0001; ambG.connect(master);
  musG=actx.createGain(); musG.gain.value=0.0001; musG.connect(master);
  const air=actx.createBufferSource(); air.buffer=noiseBuf(2); air.loop=true;
  const aLP=actx.createBiquadFilter(); aLP.type='lowpass'; aLP.frequency.value=440;
  const aG=actx.createGain(); aG.gain.value=0.05; air.connect(aLP).connect(aG).connect(ambG); air.start();
  const o1=actx.createOscillator(),o2=actx.createOscillator(); o1.type='sine';o2.type='triangle'; o1.frequency.value=110;o2.frequency.value=165;
  const pLP=actx.createBiquadFilter(); pLP.type='lowpass'; pLP.frequency.value=560; const pG=actx.createGain(); pG.gain.value=0.03; o1.connect(pLP);o2.connect(pLP);pLP.connect(pG).connect(ambG);o1.start();o2.start();
  musDelay=actx.createDelay(1.0); musDelay.delayTime.value=0.28; const fb=actx.createGain(); fb.gain.value=0.30; musDelay.connect(fb); fb.connect(musDelay); musDelay.connect(musG);
  const dr=actx.createOscillator(); dr.type='sine'; dr.frequency.value=110; const drLP=actx.createBiquadFilter(); drLP.type='lowpass'; drLP.frequency.value=380; const drG=actx.createGain(); drG.gain.value=0.022; dr.connect(drLP).connect(drG).connect(musG); dr.start();
  scheduleCricket(); scheduleNote();
  return true;
}
function pingCatch(rare){ if(!ambOn||!actx)return; const o=actx.createOscillator(); o.type='sine'; const t0=actx.currentTime; const f0=rare?523:660, f1=rare?784:990; o.frequency.setValueAtTime(f0,t0); o.frequency.exponentialRampToValueAtTime(f1,t0+(rare?0.14:0.08)); const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(rare?0.08:0.06,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0008,t0+(rare?0.4:0.22)); o.connect(g).connect(master); o.start(t0); o.stop(t0+(rare?0.45:0.25)); if(rare){ const o2=actx.createOscillator(); o2.type='triangle'; o2.frequency.setValueAtTime(392,t0); const g2=actx.createGain(); g2.gain.setValueAtTime(0.0001,t0); g2.gain.exponentialRampToValueAtTime(0.05,t0+0.03); g2.gain.exponentialRampToValueAtTime(0.0006,t0+0.5); o2.connect(g2).connect(master); o2.start(t0); o2.stop(t0+0.55);} }
function pingSun(){ if(!ambOn||!actx)return; const t0=actx.currentTime; [440,554,659].forEach((f,k)=>{ const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f; const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.05,t0+0.05+k*0.03); g.gain.exponentialRampToValueAtTime(0.0005,t0+1.7); o.connect(g).connect(master); o.start(t0); o.stop(t0+1.8); }); }
function pingMoon(){ if(!ambOn||!actx)return; const t0=actx.currentTime; [659,880,988].forEach((f,k)=>{ const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f; const g=actx.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(0.04,t0+0.12+k*0.06); g.gain.exponentialRampToValueAtTime(0.0004,t0+2.4); o.connect(g).connect(master); o.start(t0); o.stop(t0+2.5); }); }
function cricket(){ if(!ambOn||!actx)return; const src=actx.createBufferSource(); src.buffer=noiseBuf(0.32); const bp=actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=evening.cricketHz+(Math.random()*500-250); bp.Q.value=16; const g=actx.createGain(); const t0=actx.currentTime; const dur=0.16+Math.random()*0.18; g.gain.setValueAtTime(0,t0); for(let i=0,p=Math.floor(dur/0.012);i<p;i++){const tt=t0+i*0.012; g.gain.setValueAtTime(0,tt); g.gain.linearRampToValueAtTime(0.5,tt+0.004); g.gain.linearRampToValueAtTime(0,tt+0.011);} const vg=actx.createGain(); vg.gain.value=0.035+audioNight*0.10; src.connect(bp).connect(g); if(actx.createStereoPanner){const pan=actx.createStereoPanner(); pan.pan.value=Math.random()*1.4-0.7; g.connect(pan); pan.connect(vg);} else g.connect(vg); vg.connect(ambG); src.start(t0); src.stop(t0+dur+0.05); }
function scheduleCricket(){ if(!actx)return; const gap=(900-audioNight*640)*(0.55+Math.random()*0.9); crickTimer=setTimeout(()=>{ if(ambOn){ const k=1+Math.floor(audioNight*2); for(let i=0;i<k;i++) setTimeout(cricket,Math.random()*120);} scheduleCricket(); }, gap); }
function musNote(){ if(!musOn||!actx)return; if(!musRng)musRng=mulberry32((seed^0x9E3779B9)>>>0); musIdx+=Math.floor(musRng()*3)-1; musIdx=Math.max(0,Math.min(SCALE.length*3-1,musIdx)); const oct=Math.floor(musIdx/SCALE.length), deg=SCALE[musIdx%SCALE.length]; const semis=deg+12*oct-(audioNight>0.55?12:0); const freq=220*Math.pow(2,semis/12); const o=actx.createOscillator(); o.type=Math.random()<0.5?'sine':'triangle'; o.frequency.value=freq; const lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900+audioWarm*1400; const g=actx.createGain(); const t0=actx.currentTime; g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(0.10,t0+0.04); g.gain.exponentialRampToValueAtTime(0.0008,t0+1.6); o.connect(lp).connect(g); g.connect(musG); g.connect(musDelay); o.start(t0); o.stop(t0+1.7); }
function scheduleNote(){ if(!actx)return; const gap=(2000+audioNight*1500)*(0.7+Math.random()*0.7); musTimer=setTimeout(()=>{ if(musOn){ musNote(); if(Math.random()<0.22) setTimeout(musNote,180+Math.random()*220);} scheduleNote(); }, gap); }

/* ============================ flow + controls ============================ */
const introEl=document.getElementById('intro'), endEl=document.getElementById('end');
const closeLineEl=document.getElementById('closeLine'), endCountEl=document.getElementById('endCount'), endBestEl=document.getElementById('endBest');
const soundBtn=document.getElementById('sound'), musicBtn=document.getElementById('music');

function closingLine(n){
  if(n<=0) return "Not one tonight — but you stayed out 'til dark, and that was the point.";
  if(n<4)  return n+" of them, blinking in the glass. Enough to read one page by.";
  if(n<9)  return "A jar of "+n+". Bright enough to walk someone home.";
  return n+" fireflies. You caught enough light to keep the whole summer in a jar.";
}
function startRound(){
  ensureAudio(); if(actx&&actx.state==='suspended')actx.resume();
  ambOn=true; soundBtn.textContent='sound: on'; soundBtn.classList.add('on');
  introEl.classList.add('hide'); endEl.classList.add('hide');
  newEvening(); resetRound(); phase='play';
}
function endRound(){
  phase='end';
  if(count>best) best=count;
  closeLineEl.textContent=closingLine(count);
  endCountEl.textContent=count+(count===1?' firefly':' fireflies');
  endBestEl.textContent='best evening · '+best;
  endEl.classList.remove('hide');
}

// start screen: pick your place, then begin
const SCENES=[['meadow','meadow'],['forest','forest'],['mesa','mesa']]; // beach parked post-MVP
const scenePicker=document.getElementById('scenePicker'), beginBtn=document.getElementById('begin');
SCENES.forEach(([id,label])=>{
  const b=document.createElement('button');
  b.className='chip'+(id===scene?' on':''); b.textContent=label; b.dataset.scene=id;
  b.addEventListener('click',()=>{ scene=id; [...scenePicker.children].forEach(c=>c.classList.toggle('on',c.dataset.scene===id)); newEvening(); resetRound(); });
  scenePicker.appendChild(b);
});
beginBtn.addEventListener('click',startRound);
again.addEventListener('click',()=>{ endEl.classList.add('hide'); newEvening(); resetRound(); phase='play'; });
document.getElementById('changePlace').addEventListener('click',()=>{ endEl.classList.add('hide'); introEl.classList.remove('hide'); phase='intro'; newEvening(); resetRound(); });

// drag the jar
function ptrX(e){ const r=cv.getBoundingClientRect(); return clamp((e.clientX-r.left)/r.width,0,1)*W; }
let dragging=false;
cv.addEventListener('pointerdown',e=>{ if(phase!=='play')return; dragging=true; jarTargetX=ptrX(e)-CFG.JAR_W/2; cv.setPointerCapture(e.pointerId); });
cv.addEventListener('pointermove',e=>{ if(dragging&&phase==='play') jarTargetX=ptrX(e)-CFG.JAR_W/2; });
cv.addEventListener('pointerup',()=>dragging=false);
cv.addEventListener('pointercancel',()=>dragging=false);
addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'||e.key==='a')input.left=true; if(e.key==='ArrowRight'||e.key==='d')input.right=true; if(['ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault(); });
addEventListener('keyup',e=>{ if(e.key==='ArrowLeft'||e.key==='a')input.left=false; if(e.key==='ArrowRight'||e.key==='d')input.right=false; });

soundBtn.addEventListener('click',()=>{ if(!ensureAudio())return; if(actx.state==='suspended')actx.resume(); ambOn=!ambOn; soundBtn.textContent='sound: '+(ambOn?'on':'off'); soundBtn.classList.toggle('on',ambOn); });
musicBtn.addEventListener('click',()=>{ if(!ensureAudio())return; if(actx.state==='suspended')actx.resume(); musOn=!musOn; musicBtn.textContent='music: '+(musOn?'on':'off'); musicBtn.classList.toggle('on',musOn); });

/* ============================ main loop ============================ */
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  update(dt);
  render(now/1000);
  if(actx){ const aT=ambOn?0.55*(0.34+0.66*audioNight):0.0001, mT=musOn?0.5:0.0001; ambG.gain.value+=(aT-ambG.gain.value)*0.05; musG.gain.value+=(mT-musG.gain.value)*0.05; }
  requestAnimationFrame(loop);
}
newEvening(); resetRound();
requestAnimationFrame(loop);
</script>
