<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IRONLINE — Battle Train of the Rail Oceans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#15110d;color:#efe3cc;font-family:'VT323',monospace;display:flex;justify-content:center}
#app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;background:#15110d;position:relative}
#topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 10px 6px}
#topbar .brand{font-family:'Press Start 2P',monospace;font-size:13px;color:#e0a33a;letter-spacing:1px;text-shadow:1px 1px 0 #6e3a18;white-space:nowrap}
.statbar{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.st{background:#241c14;border:2px solid #3a2e22;padding:4px 2px;text-align:center}
.st b{font-family:'Press Start 2P',monospace;font-size:10px;display:block;color:#efe3cc;margin-bottom:3px}
.st span{font-size:13px;color:#a8957a;text-transform:uppercase;letter-spacing:1px}
.st.warn b{color:#e07b2a}
.frame{flex:0 0 auto;border:3px solid #2a221b;border-left:0;border-right:0;background:#0e0b08;padding:3px 0}
.cvwrap{position:relative;line-height:0}
canvas{width:100%;display:block;image-rendering:pixelated;background:#d9a05e}
#region{position:absolute;top:10px;left:0;right:0;text-align:center;font-family:'Press Start 2P',monospace;font-size:11px;color:#f4e3bc;letter-spacing:2px;text-shadow:1px 1px 0 #4a1e0e,0 0 6px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.8s ease;pointer-events:none}
#ticker{flex:0 0 auto;font-size:18px;line-height:1.2;color:#cdb894;padding:7px 12px;background:#1d1814;border-bottom:2px solid #3a2e22;min-height:34px;display:flex;align-items:center}
#content{flex:1 1 auto;overflow-y:auto;min-height:0;padding:10px 12px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410;overflow-x:hidden}
#content::-webkit-scrollbar{width:9px}
#content::-webkit-scrollbar-track{background:#1a1410;border-left:2px solid #2a221b}
#content::-webkit-scrollbar-thumb{background:#6b4a2e;border:1px solid #8a5a1a;border-radius:0}
#content::-webkit-scrollbar-thumb:hover{background:#8a5a1a}
#content::-webkit-scrollbar-thumb:active{background:#e0a33a}
.view{animation:fade 0.2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
#nextdepot{font-size:16px;color:#8a7a64;text-align:center;margin-bottom:8px;min-height:18px}
#depot{display:none;background:#1d1814;border:3px solid #5f4d38;padding:14px 12px}
#depot.show{display:block}
#depot h3{font-family:'Press Start 2P',monospace;font-size:12px;color:#e0a33a;text-align:center;letter-spacing:1px;margin-bottom:4px}
#depot .flav{font-size:16px;color:#a8957a;text-align:center;margin-bottom:12px;line-height:1.3}
#depot .opt{width:100%;min-height:48px;margin-bottom:8px;font-size:18px;background:#2c241c;color:#efe3cc;border:2px solid #5f4d38;border-bottom-width:4px;text-align:left;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
#depot .opt:active{border-bottom-width:2px;transform:translateY(1px)}
#depot .opt:disabled{opacity:0.4;transform:none}
#depot .opt .od{font-size:14px;color:#a8957a;font-family:'VT323',monospace}
#depot .leave{width:100%;min-height:40px;font-size:16px;background:none;color:#a8957a;border:2px solid #4a3a2c;margin-top:4px}
#travelstatus{font-size:16px;color:#a8957a;text-align:center;line-height:1.5}
#travelstatus b{color:#cdb894;font-weight:400}
button{font-family:'VT323',monospace;cursor:pointer;border:none}
#actionbar{flex:0 0 auto;padding:6px 10px 8px}
#go{width:100%;min-height:50px;font-size:22px;background:#e0a33a;color:#2a1c08;border:3px solid #8a5a1a;border-bottom-width:5px;letter-spacing:1px;text-transform:uppercase}
#go:active{border-bottom-width:3px;transform:translateY(2px)}
#go:disabled{background:#5a4632;color:#8a7a64;border-color:#3a2e22;transform:none}
#go.docked{background:#3a2e22;color:#e0a33a;border-color:#5f4d38}
#tabs{flex:0 0 auto;display:flex;border-top:3px solid #2a221b;background:#0e0b08}
.tab{flex:1;min-height:50px;font-size:17px;background:#15110d;color:#8a7a64;border:none;border-right:1px solid #2a221b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;letter-spacing:1px}
.tab:last-child{border-right:none}
.tab .ti{font-size:13px;opacity:0.7}
.tab.active{background:#241c14;color:#e0a33a}
.tab.active .ti{opacity:1}
.tab.alert{color:#e07b2a}
#cars{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
#crewlist{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.crewsum{grid-column:1/-1;background:#1c1812;border:2px solid #4a3a2c;border-left:4px solid #e6cf86;padding:10px 12px}
.cshd{font-size:18px;color:#efe3cc;display:flex;align-items:center}
.cseff{font-size:15px;color:#e6cf86;margin-top:4px}
.csnote{font-size:13px;color:#8a7a64;margin-top:5px}
.benchhd{grid-column:1/-1;font-size:14px;color:#d8c038;letter-spacing:.5px;text-transform:uppercase;margin:2px 0 -2px;display:flex;align-items:center}
.herochip{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:8px;background:#241d12;border:2px solid #6a5a22;border-left:4px solid #d8c038;color:#efe3cc;padding:9px 12px;text-align:left;cursor:pointer;font:inherit}
.herochip .hn{font-size:16px;color:#f0d878;font-weight:600}
.herochip .hb{font-size:13px;color:#b9a874}
.herochip.sel{background:#3a2f12;border-color:#ffe06a;box-shadow:0 0 0 2px rgba(255,210,62,.35) inset}
.herochip.war{border-left-color:#b03028}
.herochip.war .hn{color:#f0a878}
.herochip.rare{border-color:#b8901e;border-left-color:#ffd23e;background:#322611}
.herochip.rare .hn{color:#ffe06a}
.herochip.rare.sel{border-color:#ffe06a;box-shadow:0 0 0 2px rgba(255,210,62,.5) inset}
.card.herocar{border-color:#6a5a22;border-left:4px solid #d8c038}
.card.rarecar{border-color:#b8901e;border-left:4px solid #ffd23e}
.up.alt{background:#2c2412;border-color:#6a5a22;color:#e6cf86}
.up.alt:hover{background:#3a2f16}
.card{background:#241c14;border:2px solid #4a3a2c;padding:10px;position:relative}
.card::before,.card::after{content:"";position:absolute;width:4px;height:4px;background:#5f4d38;top:4px}
.card::before{left:4px}.card::after{right:4px}
.card.empty{background:#1a1410;border-style:dashed;border-color:#3a2e22}
.hd{display:flex;justify-content:space-between;align-items:baseline}
.hd .nm{font-size:19px;color:#efe3cc}
.hd .lv{font-family:'Press Start 2P',monospace;font-size:8px;color:#e0a33a}
.sub{font-size:16px;color:#a8957a;margin-top:3px;min-height:18px}
.up{width:100%;min-height:40px;margin-top:8px;font-size:17px;background:#3a2e22;color:#efe3cc;border:2px solid #5f4d38;border-bottom-width:4px}
.up:active{border-bottom-width:2px;transform:translateY(1px)}
.up:disabled{opacity:0.4;transform:none}
.wsel{display:flex;gap:5px;margin-top:7px}
.wcyc{flex:1;min-height:32px;font-size:13px;background:#2a2620;color:#cdb894;border:2px solid #4a3a2c;border-bottom-width:3px;padding:2px 4px;line-height:1.1}
.wcyc:active{border-bottom-width:2px;transform:translateY(1px)}
#app.land .wcyc{font-size:12px}
.up.build{background:#2c3a26;border-color:#4a5f3c}
#slotbtn{grid-column:span 2;min-height:50px;font-size:19px;background:#241c14;color:#e0a33a;border:2px dashed #8a5a1a}
#slotbtn:disabled{opacity:0.4}
.trainfoot{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
#savemsg{font-size:16px;color:#6e5f4c}
#reset{font-size:16px;background:none;color:#a85a4a;border:2px solid #5a3228;padding:8px 12px;min-height:40px}
.pip{display:inline-block;width:8px;height:8px;margin-right:4px}
#maplist .stop{display:flex;align-items:center;gap:10px;padding:10px;background:#1d1814;border:2px solid #3a2e22;margin-bottom:7px}
#maplist .stop.next{border-color:#8a5a1a;background:#241c14}
#maplist .dot{width:10px;height:10px;border-radius:50%;background:#5f4d38;flex:0 0 auto}
#maplist .stop.next .dot{background:#e0a33a}
#maplist .nm{flex:1;font-size:19px;color:#cdb894}
#maplist .km{font-size:16px;color:#8a7a64}
#maplist .here{font-size:16px;color:#a8957a;text-align:center;margin-bottom:10px}
#loglist .ln{font-size:17px;color:#a8957a;padding:5px 2px;border-bottom:1px solid #241c14;line-height:1.3}
#loglist .ln:first-child{color:#cdb894}
/* ===================== LANDSCAPE / DESKTOP SKIN ===================== */
#dispmenu{position:absolute;z-index:50;display:flex;flex-direction:column;gap:6px}
#dm,#dmpop button{font-family:'VT323',monospace;font-size:13px;padding:6px 10px;background:#3a2e22;color:#e0a33a;border:2px solid #8a5a1a;letter-spacing:1px;white-space:nowrap;line-height:1;cursor:pointer}
#dm{align-self:flex-end}
#dmpop{display:none;flex-direction:column;gap:6px}
#dispmenu.open #dmpop{display:flex}
#dmpop button{width:100%;min-width:104px;text-align:center}
#app:not(.land) #dispmenu{top:9px;right:10px;align-items:flex-end}
#app:not(.land) #topbar{padding-right:48px}
#app.land{max-width:none;display:block;position:relative;overflow:hidden}
#app.land .frame{position:absolute;inset:0;border:0;padding:0;z-index:0}
#app.land .cvwrap{width:100%;height:100%}
#app.land canvas{width:100%;height:100%;border:0;object-fit:contain;background:#0e0b08}
#app.land #region{display:none}
#app.land #topbar{position:absolute;top:0;left:0;right:0;z-index:5;padding:8px 12px;background:linear-gradient(rgba(8,6,4,0.6),rgba(8,6,4,0));pointer-events:none}
#app.land #topbar .brand{display:none}
#app.land .statbar{display:flex;gap:6px;width:100%}
#app.land .statbar .st{background:rgba(18,14,10,0.72);min-width:60px;pointer-events:auto;padding:3px 2px}
#app.land .statbar .st:nth-child(2){margin-right:auto}
#app.land #dispmenu{left:14px;bottom:54px;top:auto;right:auto;align-items:flex-start;flex-direction:column-reverse}
#app.land #dm{align-self:flex-start}
/* ----- immersive mode: strip all chrome, keep the display menu to get back out ----- */
#app.immersive #topbar,#app.immersive #ticker,#app.immersive #content,#app.immersive #actionbar,#app.immersive #tabs,#app.immersive #region{display:none}
#app.immersive:not(.land){justify-content:center}
#app.immersive #dispmenu{top:10px;right:10px;left:auto;bottom:auto;align-items:flex-end;flex-direction:column}
#app.immersive #dm{opacity:0.5;background:rgba(20,16,12,0.66);align-self:flex-end}
#app.immersive #dm:active{opacity:1}
/* top-center route header (travel info + biome, all in one place) */
#app.land #content{position:absolute;top:8px;left:50%;right:auto;transform:translateX(-50%);bottom:auto;width:auto;max-width:54%;z-index:6;max-height:none;overflow:visible;padding:3px 16px 4px;text-align:center;background:rgba(8,6,4,0.46);border:0;border-radius:0 0 6px 6px}
#app.land #nextdepot{margin:0;font-size:17px;color:#cdb894}
#app.land #travelstatus{font-size:14px;color:#9fd8d8;letter-spacing:1px}
#app.land #ticker{position:absolute;top:62px;bottom:auto;left:50%;transform:translateX(-50%);z-index:5;max-width:58%;background:rgba(8,6,4,0.5);border:0;border-radius:4px;padding:3px 14px;min-height:0;justify-content:center;text-align:center;font-size:14px}
/* heavy views / depot: slide-up tray from the bottom (overrides the top header) */
#app.land.vopen #content{top:auto;left:0;right:0;transform:none;bottom:48px;width:auto;max-width:none;max-height:62%;overflow-y:auto;background:rgba(12,9,6,0.96);border:0;border-top:3px solid #2a221b;border-radius:0;padding:12px 16px;text-align:left}
#app.land.vopen #ticker{opacity:0}
#app.land #cars{grid-template-columns:repeat(4,minmax(0,1fr))}
#app.land #crewlist{grid-template-columns:repeat(3,minmax(0,1fr))}
#app.land #slotbtn{grid-column:span 4}
#app.land #actionbar{position:absolute;right:14px;bottom:54px;z-index:8;padding:0;width:auto}
#app.land #go{width:auto;min-width:128px;padding:0 16px;min-height:42px;font-size:18px}
#app.land #tabs{position:absolute;left:0;right:0;bottom:0;z-index:7;border-top:3px solid #2a221b;background:rgba(8,6,4,0.92)}
#app.land .tab{min-height:46px;font-size:14px}
@media (max-width:560px){#app.land #content{max-width:64%}#app.land #go{min-width:106px;font-size:16px}#app.land #dispmenu{bottom:52px}}
/* ----- Phase 2: filmstrip management tray (landscape) ----- */
#app.land #cars{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410}
#app.land #cars .card{flex:0 0 134px;width:134px}
#app.land #slotbtn{flex:0 0 134px;width:134px;grid-column:auto;min-height:auto}
#app.land #maplist{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410}
#app.land #maplist .stop{flex:0 0 auto;flex-direction:column;align-items:center;min-width:118px;text-align:center;gap:5px}
#app.land #maplist .here{flex:0 0 auto;align-self:center;text-align:left;margin:0 6px 0 0;color:#cdb894}
#app.land #maplist .nm{flex:none}
#app.land #loglist{column-count:2;column-gap:18px}
#app.land #cars::-webkit-scrollbar,#app.land #maplist::-webkit-scrollbar{height:8px}
#app.land #cars::-webkit-scrollbar-thumb,#app.land #maplist::-webkit-scrollbar-thumb{background:#6b4a2e;border:1px solid #8a5a1a}
#app.land #cars::-webkit-scrollbar-track,#app.land #maplist::-webkit-scrollbar-track{background:#1a1410}
/* ===== desktop windowed (portrait skin on a big screen): bigger scene, vertically centered, framed — kills the dead gap ===== */
@media (min-width:760px){
  body{align-items:center;background:radial-gradient(135% 130% at 50% 36%,#1c150e 0%,#0b0806 72%)}
  #app:not(.land){max-width:min(94vw,860px);height:auto;max-height:100dvh;border:1px solid #2a221b;box-shadow:0 14px 50px rgba(0,0,0,0.55)}
}
@media (min-width:760px) and (max-height:780px){
  #app:not(.land){max-width:min(94vw,680px)}
}</style>
</head>
<body>
<div id="app">
<div id="topbar">
<div class="brand">IRONLINE</div>
<div class="statbar">
<div class="st"><b id="s-scrap">120</b><span>scrap</span></div>
<div class="st"><b id="s-food">20</b><span>food</span></div>
<div class="st"><b id="s-fuel">30</b><span>fuel</span></div>
<div class="st" id="hullbox"><b id="s-hull">90/90</b><span>hull</span></div>
</div>
</div>
<div id="dispmenu">
<button id="dm" title="Display options">⚙</button>
<div id="dmpop">
<button id="lt" title="Toggle mobile / desktop layout">⛶ Desktop</button>
<button id="fs" title="Toggle fullscreen">⛶ Full</button>
<button id="im" title="Immersive mode (hide all UI)">◹ Immerse</button>
</div>
</div>
<div class="frame"><div class="cvwrap"><canvas id="cv" width="640" height="360" aria-label="Side view of your armored battle train rolling through a ruined desert wasteland on a multi-lane rail ocean"></canvas><div id="region"></div></div></div>
<div id="ticker">The wastes are quiet. Upgrade your rig, then depart.</div>
<div id="content">
<div class="view" id="v-travel">
<div id="nextdepot"></div>
<div id="depot"></div>
<div id="travelstatus"></div>
</div>
<div class="view" id="v-train" hidden>
<div id="cars"></div>
<div class="trainfoot"><span id="savemsg"></span><button id="reset">Scuttle &amp; restart</button></div>
</div>
<div class="view" id="v-crew" hidden><div id="crewlist"></div></div>
<div class="view" id="v-map" hidden><div id="maplist"></div></div>
<div class="view" id="v-log" hidden><div id="loglist"></div></div>
</div>
<div id="actionbar"><button id="go">Depart · 5 food</button></div>
<nav id="tabs">
<button class="tab active" data-v="travel"><span class="ti">▸</span>Travel</button>
<button class="tab" data-v="train"><span class="ti">⚙</span>Train</button>
<button class="tab" data-v="crew"><span class="ti">❖</span>Crew</button>
<button class="tab" data-v="map"><span class="ti">◈</span>Map</button>
<button class="tab" data-v="log"><span class="ti">≣</span>Log</button>
</nav>
</div>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const appEl=document.getElementById('app');
const RS=2;
ctx.imageSmoothingEnabled=false;
// ---- HERO SPRITE REGISTRY (imported via ironline-import.py: reference asset -> game sprite) ----
const SPRITES={};
function loadSprite(name,w,h,data){const img=new Image();SPRITES[name]={w,h,img,ready:false};img.onload=()=>{SPRITES[name].ready=true};img.src=data;}
function spriteReady(name){const s=SPRITES[name];return !!(s&&s.ready);}
// blit a hero sprite at logical (x,y) where y is the BASELINE its bottom rests on (the rail)
function blitSprite(name,x,y,scale,flip){const s=SPRITES[name];if(!s||!s.ready)return false;const sc=scale||1;if(flip){ctx.save();ctx.translate(Math.round(x+s.w*sc),Math.round(y-s.h*sc));ctx.scale(-1,1);ctx.drawImage(s.img,0,0,Math.round(s.w*sc),Math.round(s.h*sc));ctx.restore();}else{ctx.drawImage(s.img,Math.round(x),Math.round(y-s.h*sc),Math.round(s.w*sc),Math.round(s.h*sc));}return true;}

function crewBuffs(){
 const b={gunMult:1,foodMult:1,fuelMult:1,scrapMult:1,hullRegen:0,hullDmgMult:1,hullFloor:0};
 for(const s of S.slots){if(!s)continue;const c=activeCrew(s),r=c.rank;
  if(c.kind=='captain')b.gunMult+=r*0.10;
  else if(c.kind=='sergeant')b.hullDmgMult-=r*0.05;
  else if(c.kind=='farmhand')b.foodMult+=r*0.12;
  else if(c.kind=='mechanic')b.hullRegen+=r;
  else if(c.kind=='stoker')b.fuelMult-=r*0.06;
  else if(c.kind=='cook')b.foodMult+=r*0.18;
  else if(c.kind=='medic')b.hullFloor=Math.max(b.hullFloor,0.20+r*0.10);
  else if(c.kind=='greaser')b.fuelMult-=r*0.07;
  else if(c.kind=='tinker')b.hullRegen+=r;
  else if(c.kind=='warboss'){b.gunMult+=r*0.10;b.scrapMult+=r*0.08;}
  else if(c.kind=='bombardier')b.gunMult+=r*0.09;
  else if(c.kind=='ironside')b.hullDmgMult-=r*0.06;
  else if(c.kind=='reaver')b.scrapMult+=r*0.15;
  else if(c.kind=='scavenger')b.scrapMult+=r*0.15;
 }
 b.hullDmgMult=Math.max(0.4,b.hullDmgMult);b.fuelMult=Math.max(0.4,b.fuelMult);
 return b;
}

function depotName(idx){return DPRE[Math.floor(hash(idx*3+1)*DPRE.length)]+' '+DSUF[Math.floor(hash(idx*7+2)*DSUF.length)]}
function depotFlavor(idx){return DFLAV[Math.floor(hash(idx*5+4)*DFLAV.length)]}
function offerObj(type,idx){
if(type=='repair'){const c=Math.round(18+idx*6);return{label:'Repair bay',desc:'−'+c+' scrap · full hull',can:()=>S.scrap>=c&&S.hull<maxHull(),act:()=>{S.scrap-=c;S.hull=maxHull();log('Hull fully welded at the depot.')}}}
if(type=='food'){const c=Math.round(22+idx*7),g=Math.round(16+idx*5);return{label:'Provisioner',desc:'−'+c+' scrap · +'+g+' food',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;S.food+=g;log('Loaded '+g+' food from the provisioner.')}}}
if(type=='fuel'){const c=Math.round(14+idx*5),g=Math.round(12+idx*4);return{label:'Fuel depot',desc:'−'+c+' scrap · +'+g+' fuel',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;S.fuel+=g;log('Topped off '+g+' fuel at the depot.')}}}
if(type=='recruit'){const c=Math.round(70+idx*22);return{label:'Wandering specialist',desc:'\u2212'+c+' scrap · recruit a wanderer',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;recruitHero('wander')}}}
if(type=='scrap'){const c=Math.round(12+idx*4),g=Math.round(40+idx*14);return{label:'Scrap broker',desc:'−'+c+' food · +'+g+' scrap',can:()=>S.food>=c,act:()=>{S.food-=c;S.scrap+=g;log('Sold rations for '+g+' scrap.')}}}
if(type=='scavenge'){return{label:'Pick the wreck-stacks',desc:'free · gamble',can:()=>true,act:()=>{const r=Math.random();if(r<0.5){const g=Math.round(35+idx*13);S.scrap+=g;log('Scavenging paid off — +'+g+' scrap.')}else if(r<0.8){const g=Math.round(12+idx*5);S.food+=g;log('Found a food cache — +'+g+' food.')}else log('The stacks were already picked clean. Nothing here.')}}}
if(type=='cache'){const g=Math.round(24+idx*10);return{label:'Supply cache',desc:'free · +'+g+' scrap',can:()=>true,act:()=>{S.scrap+=g;log('Cracked a supply cache — +'+g+' scrap.')}}}
return{label:'Black-market fixer',desc:'free · next upgrade ½ price',can:()=>!S.discount,act:()=>{S.discount=true;log('A fixer marks down your next upgrade to half price.')}}}
function depotOffers(idx){const pool=['repair','food','scrap','fuel','recruit','scavenge','cache','discount'],pick=[],used={};let k=0;while(pick.length<3&&k<20){const t=pool[Math.floor(hash(idx*13+k*7+9)*pool.length)];if(!used[t]){used[t]=1;pick.push(t)}k++}if(!pick.includes('scavenge')&&!pick.includes('cache'))pick[2]='scavenge';return pick.map(t=>offerObj(t,idx))}
function maybeDepot(){const prev=S.dist;S.dist+=4+Math.floor(S.engine*0.6);if(Math.floor(S.dist/DEPOT_KM)>Math.floor(prev/DEPOT_KM))openDepot(Math.floor(S.dist/DEPOT_KM))}
function openDepot(idx){S.depot={idx,name:depotName(idx),offers:depotOffers(idx)};S.mode='depot';log('You pull into '+S.depot.name+'. '+depotFlavor(idx));renderDepot();showView('travel')}
function renderDepot(){const d=S.depot,el=document.getElementById('depot');if(!d){el.className='';el.innerHTML='';return}
let h='<h3>'+d.name+'</h3><div class="flav">'+depotFlavor(d.idx)+'</div>';
d.offers.forEach((o,k)=>{h+='<button class="opt" data-k="'+k+'" '+(o.can()?'':'disabled')+'><span>'+o.label+'</span><span class="od">'+o.desc+'</span></button>'});
h+='<button class="leave" data-k="-1">Press on without stopping</button>';
el.innerHTML=h;el.className='show';
}
document.getElementById('depot').addEventListener('click',e=>{const b=e.target.closest('button');if(!b||b.disabled||!S.depot)return;const k=+b.dataset.k;if(k>=0)S.depot.offers[k].act();S.depot=null;S.mode='idle';renderDepot();cards();save();showView('travel')});

const reg=BIOMES[Math.max(0,curIdx)],wl=(wBlend<0.5?wCur:wNext).label,rn=reg?reg.name:'the wastes';

let _pd=false,_pdrag=false,_psx=0,_ppan=0;
// map a pointer event to logical 320x180, accounting for object-fit:contain letterboxing (landscape)
const _fit=()=>{const r=cv.getBoundingClientRect(),ca=640/360,ra=r.width/r.height;let dw=r.width,dh=r.height,ox=0,oy=0;if(ra>ca){dw=r.height*ca;ox=(r.width-dw)/2}else{dh=r.width/ca;oy=(r.height-dh)/2}return{r,dw,dh,ox,oy};};
const _lx=e=>{const f=_fit();return (e.clientX-f.r.left-f.ox)/f.dw*320;};
const _ly=e=>{const f=_fit();return (e.clientY-f.r.top-f.oy)/f.dh*180;};
cv.addEventListener('pointerdown',e=>{_pd=true;_pdrag=false;_psx=_lx(e);_ppan=S.pan;try{cv.setPointerCapture(e.pointerId)}catch(_){}});
cv.addEventListener('pointermove',e=>{if(!_pd)return;const dx=_lx(e)-_psx;if(!_pdrag&&Math.abs(dx)>6)_pdrag=true;if(_pdrag&&!(S.boss||S.raiders.length)){S.pan=Math.max(0,Math.min(S.maxPan,_ppan+dx));S.panHintT=2;}});
cv.addEventListener('pointerup',e=>{const ix=_lx(e),iy=_ly(e);if(_pd&&Math.abs(ix-_psx)<8&&S.crate&&!S.crate.grabbed){const c=S.crate;if(ix>=c.x-9&&ix<=c.x+20&&iy>=c.y-10&&iy<=c.y+20)grabCrate();}_pd=false;_pdrag=false;try{cv.releasePointerCapture(e.pointerId)}catch(_){}});
cv.addEventListener('pointercancel',()=>{_pd=false;_pdrag=false;});

{let cr=false;for(const s of S.slots){if(s){const c=activeCrew(s);if(c.rank<MAXRANK&&S.scrap>=crewRankCost(c.rank)){cr=true;break}}}if(S.heroes.length)cr=true;

function carStruct(cx,w,cm,i){
// horizontal armored-plate seam dividing the side into riveted plates
px(cx+1,DECK+12,w-2,1,cm[0]);px(cx+1,DECK+13,w-2,1,cm[4]);

// bolted corners (angle-iron frame)
[[cx+1,DECK+1],[cx+w-2,DECK+1],[cx+1,BASE-5],[cx+w-2,BASE-5]].forEach(c=>{px(c[0],c[1],1,1,cm[4]);px(c[0],c[1]+1,1,1,cm[0])});

ctx.fillStyle='rgba(184,92,40,'+(0.06*dnLight)+')';ctx.fillRect(0,0,320,180);
if(dnLight<0.95){ctx.fillStyle='rgba(12,16,40,'+((1-dnLight)*0.44)+')';ctx.fillRect(0,0,320,180)}
const v=ctx.createRadialGradient(160,86,44,160,86,184);v.addColorStop(0,'rgba(0,0,0,0)');v.addColorStop(1,'rgba(28,11,5,0.5)');
ctx.fillStyle=v;ctx.fillRect(0,0,320,180);
for(let i=0;i<28;i++){const gx=(i*61+S.T*22+i*13)%320,gy=((i*37)%180+Math.sin(S.T*0.6+i)*6+180)%180;pxa(gx,gy,1,1,'rgba(240,222,184,0.12)')}
applyWeather();
}
function draw(){
ctx.setTransform(RS,0,0,RS,0,0);
drawBackdrop();
lane(110);
S.smoke.forEach(s=>{const c=s.t>0.9?'#7c756c':s.t>0.5?'#a89f93':'#cfc8bc';const sz=s.t>0.7?4:s.t>0.35?3:2;px(s.x,s.y,sz,sz,c)});
if(S.ptrain)drawPtrain();
lane(138);
ctx.fillStyle='rgba(24,12,6,0.22)';ctx.fillRect(16,139,294,4);
drawTrain();
lane(166);
if(S.mode=='idle'){
const tw=S.tw;
px(tw.x,160+Math.round(Math.abs(Math.sin(S.T*7))*-4),5,5,'#a8773e');
px(tw.x+1,161+Math.round(Math.abs(Math.sin(S.T*7))*-4),1,1,'#c9914f');px(tw.x+3,163+Math.round(Math.abs(Math.sin(S.T*7))*-4),1,1,'#c9914f');
}
S.raiders.forEach(drawRaider);
if(S.boss)drawBoss();
if(S.crate&&S.mode=='run')drawCrate();
drawTracers();
S.booms.forEach(b=>{const r=Math.round(b.t*18);
px(b.x-r/2,b.y-r/2,r,r,'#b8442a');
px(b.x-r/3,b.y-r/3,Math.max(2,Math.round(r*0.66)),Math.max(2,Math.round(r*0.66)),'#e07b2a');
px(b.x-r/5,b.y-r/5,Math.max(2,Math.round(r*0.4)),Math.max(2,Math.round(r*0.4)),'#ffd23e');
if(b.t<0.2)px(b.x-1,b.y-1,3,3,'#fff8e0')});
drawOverlays();
drawPanHint();
if(S.mode=='run'){const bf=S.boss&&!S.boss.dead,eD=S.ptrain&&S.ptrain.elite&&!S.ptrain.dead&&S.ptrain.state!='out',bc=(bf||eD)?'#d23a2a':'#e0a33a',prog=bf?(1-Math.max(0,S.boss.hp)/S.boss.max):eD?(1-Math.max(0,S.ptrain.hp)/S.ptrain.max):(S.jt/S.dur);px(14,174,292,4,'#5a4632');px(14,174,Math.round(292*prog),4,bc);px(14,174,Math.round(292*prog),1,'#f2c560')}
}
function drawPanHint(){
if(S.maxPan<=3||S.boss||S.raiders.length)return;
const pulse=0.55+0.45*Math.sin(S.T*3.5),boost=Math.max(0,Math.min(1,S.panHintT/2)),a=(0.2+0.5*boost)*pulse;
const chev=(tx,ty,dir)=>{for(let i=0;i<4;i++){const xx=dir<0?tx+i:tx+3-i;px(xx,ty-i,2,1,'#efe3c6');px(xx,ty+i,2,1,'#efe3c6');}};
ctx.globalAlpha=a;
if(S.pan<S.maxPan-2){chev(4,92,-1);chev(9,92,-1);}
if(S.pan>2){chev(309,92,1);chev(314,92,1);}
ctx.globalAlpha=1;
}
let lt=0;
function tick(ts){
const dt=Math.min(0.05,(ts-lt)/1000||0.016);lt=ts;S.T+=dt;S.dt=dt;
const spd=S.mode=='run'?((S.boss&&S.boss.set&&!S.boss.dead)?0:110):14;
S.off+=spd*dt;
// follow-camera: hold native anchor (216) while enemies are present so turret aiming & approach distances stay calibrated; otherwise frame the whole consist
{const cn=S.slots.length,cw=40,L=cn*(cw+4)+52,foe=S.boss||S.raiders.length>0;
 const tEX=foe?216:Math.min(190,140-(95-L)/2);  // idle: pull train left so there's open track ahead; combat: native 216 (aiming-calibrated)
 S.ex+=(tEX-S.ex)*Math.min(1,dt*(foe?8:2.4));
 S.maxPan=Math.max(0,(L+10)-S.ex);
 if(foe)S.pan+=(0-S.pan)*Math.min(1,dt*8);
 S.pan=Math.max(0,Math.min(S.maxPan,S.pan));
 if(S.panHintT>0)S.panHintT-=dt;}
S.food+=farm()*dt;
S.fuel+=oilProd()*dt;
{const hr=crewBuffs().hullRegen;if(hr>0&&S.hull<maxHull())S.hull=Math.min(maxHull(),S.hull+hr*dt);}
if(S.mode=='idle'&&S.hull<maxHull())S.hull=Math.min(maxHull(),S.hull+1.3*dt);
S.smT-=dt;
if(S.smT<=0&&!S.engineSkin){S.smoke.push({x:S.stackX,y:90,t:1.4});S.smT=S.mode=='run'?0.08:0.35}
S.smoke.forEach(s=>{s.t-=dt;s.x-=(spd*0.32)*dt;s.y-=9*dt});
S.smoke=S.smoke.filter(s=>s.t>0&&s.x>-5);
if(S.flash>0)S.flash-=dt;
S.raiders.forEach(r=>{r.x+=r.v*dt;r.life-=dt;if(r.life<=0){S.booms.push({x:r.x+8,y:156,t:0.1});r.dead=true}});
S.raiders=S.raiders.filter(r=>!r.dead);
S.booms.forEach(b=>b.t+=dt);
S.booms=S.booms.filter(b=>b.t<0.6);
S.tracers.forEach(p=>{
p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.g)p.vy+=p.g*dt;p.life-=dt;
if(p.k=='rocket'){p.st-=dt;if(p.st<=0){S.smoke.push({x:p.x-2,y:p.y+1,t:0.6});p.st=0.04}}
let done=p.life<=0||p.x<-10||p.x>340;
if(p.k=='cannon'&&((p.vx>=0&&p.x>=p.tx)||(p.vx<0&&p.x<=p.tx)))done=true;
if(p.k=='rocket'&&Math.hypot(p.x-p.tx,p.y-p.ty)<16)done=true;
if(p.k=='mortar'&&p.vy>0&&p.y>=p.ty)done=true;
if(done){p.dead=true;
const bs=p.k=='cannon'?0.14:0.26;S.booms.push({x:p.x,y:Math.min(p.y,158),t:bs});
if(!p.bh){const r=nearRaider(p.x);if(r&&Math.abs(r.x+8-p.x)<24){r.dead=true;S.booms.push({x:r.x+8,y:156,t:0.1})}}
}
});
S.tracers=S.tracers.filter(p=>!p.dead);
if(S.mode=='idle'){S.tw.x-=28*dt;if(S.tw.x<-8)S.tw.x=340+Math.random()*220}
if(S.mode=='run'){const _eD=S.ptrain&&S.ptrain.elite&&!S.ptrain.dead&&S.ptrain.state!='out';if(!((S.boss&&!S.boss.dead)||_eD))S.jt+=dt;
if(repairRate()>0&&S.hull<maxHull())S.hull=Math.min(maxHull(),S.hull+repairRate()*dt);
const boss=S.boss;
if(boss&&!boss.dead){
boss.x+=(boss.tx-boss.x)*Math.min(1,dt*1.7);
if(!boss.set&&boss.x-boss.tx<6){boss.set=true;log('You throw the brakes \u2014 both rigs grind to a dead stop on the line. Trade fire until one is scrap.')}
const dps=gun()+troops()*1.5;boss.hp-=dps*dt;if(dps>0&&S.flash<0.3)S.flash=0.3;
boss.hitT-=dt;
if(boss.hitT<=0){boss.hitT=1.7;const dmg=Math.max(2,Math.round((7+S.journeys*2-troops()*0.5)*(1+(boss.guns||0)*0.25)));hurt(dmg);S.flash=1.3;S.booms.push({x:210,y:128,t:0.1});
if(S.hull<=0)bossEscape();}
if(S.boss&&S.boss.hp<=0)bossKill();
}
if(!S.boss){
if(S.wi<S.waves.length&&S.jt>=S.waves[S.wi]){S.wi++;wave()}
if(S.crateAt>0&&S.jt>=S.crateAt&&!S.crate){S.crate={x:340,y:150,grabbed:false};S.crateAt=-1}
if(S.ptrainAt>0&&S.jt>=S.ptrainAt&&!S.ptrain){if(S.ptrainElite){const guns=Math.min(3,2+Math.floor(S.journeys/14)),wp=['cannon','rocket','mortar'],cars=[];for(let g=0;g<guns;g++)cars.push({wpn:wp[g%3]});const m=Math.round((42+S.journeys*15)*(1+guns*0.25));S.ptrain={kind:'raider',elite:true,cars,guns,x:-96,state:'in',t:0,gave:false,atkT:1.2,muzzle:0,hp:m,max:m,dead:false};log('A heavy raider convoy thunders onto the parallel rail \u2014 ELITE WARBAND, guns bristling. Outshoot them or die on the line.')}else{const m=Math.round(30+S.journeys*10);S.ptrain={kind:S.ptrainKind,x:-64,state:'in',t:0,gave:false,atkT:1.0,muzzle:0,hp:m,max:m,dead:false};log(S.ptrainKind=='trader'?'A survivor train eases onto the parallel rail — they signal peace.':'A raider train swings onto the parallel rail, guns up!')}S.ptrainAt=-1}
}
const pt=S.ptrain;
if(pt){pt.t+=dt;if(pt.muzzle>0)pt.muzzle-=dt;
if(pt.state=='in'){pt.x+=128*dt;if(pt.x>=150){pt.x=150;pt.state='pace';pt.t=0}}
else if(pt.state=='pace'){pt.x+=Math.sin(S.T*1.5)*5*dt;
if(pt.kind=='trader'){if(!pt.gave&&pt.t>0.9){pt.gave=true;S.booms.push({x:pt.x+18,y:132,t:0.1});if(Math.random()<0.22){log('A wanderer rides the trader car across to your rig...');recruitHero('wander')}else{const sc=Math.round(20+S.journeys*12),fd=4+Math.floor(Math.random()*4);S.scrap+=sc;S.food+=fd;log('The traders toss across supplies — +'+sc+' scrap, +'+fd+' food. They wave and pull ahead.')}}if(pt.t>2.6)pt.state='out'}
else{const dps=gun()+troops()*1.5;pt.hp-=dps*dt*0.85;if(dps>0&&S.flash<0.3)S.flash=0.3;
pt.atkT-=dt;if(pt.atkT<=0){pt.atkT=pt.elite?1.1:1.4;pt.muzzle=0.18;const dmg=pt.elite?Math.max(2,Math.round((6+S.journeys*1.5-troops()*0.4)*(1+(pt.guns||0)*0.2))):Math.max(1,Math.round(4+S.journeys-troops()*0.4));hurt(dmg);S.flash=1.0;S.booms.push({x:165,y:126,t:0.08});if(S.hull<=0){const r=Math.round(base()*0.25);S.scrap+=r;S.hull=Math.round(maxHull()*0.4);S.ptrain=null;S.mode='idle';S.raiders=[];S.tracers=[];log((pt.elite?'The elite warband raked your rig apart':'The raider train shot your boiler out')+' — you limp home with '+r+' scrap.');cards();save()}}
if(S.ptrain&&pt.hp<=0){if(pt.elite){const r=Math.round(base()*1.6*crewBuffs().scrapMult);S.scrap+=r;for(let i=0;i<8;i++)S.booms.push({x:pt.x+i*8,y:96+(i%3)*6,t:0.04+i*0.05});log('ELITE WARBAND WRECKED! You strip the convoy for '+r+' scrap as it derails in flames.');if(Math.random()<0.5)recruitHero('war');else{const b=Math.round(25+S.journeys*7);S.scrap+=b;log('You salvage another '+b+' scrap from the burning cars.')}}else{const r=Math.round(base()*0.8);S.scrap+=r;for(let i=0;i<5;i++)S.booms.push({x:pt.x+i*9,y:98+(i%2)*6,t:0.05+i*0.05});log('Raider train wrecked! You strip it for '+r+' scrap as it derails.')}pt.dead=true;pt.state='out'}
else if(S.ptrain&&!pt.elite&&pt.t>3.6&&pt.state=='pace'){pt.state='out';log('The raider train breaks off and falls behind.')}}}
else if(pt.state=='out'){pt.x+=(pt.dead?70:165)*dt;if(pt.x>384)S.ptrain=null}}
if(S.crate){S.crate.x-=80*dt;if(S.crate.x<-16)S.crate=null}
if(S.mode=='run'&&!S.boss&&S.jt>=S.dur)finish();
}
S.saveT+=dt;
if(S.saveT>15&&S.mode=='idle'){S.saveT=0;save()}
draw();upd();
requestAnimationFrame(tick);
}
(async function(){
const loaded=await load();
if(loaded)log('Save recovered. Your rig idles where you left it — '+S.journeys+' crossings logged.');
else log('The wastes are quiet. Upgrade your rig, then depart.');
if(!S.layoutManual)autoLayout();
applyLayout();
applyImmersive();
cards();showView('travel');
requestAnimationFrame(tick);
})();
</script>
